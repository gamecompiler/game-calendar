                    // 현재 픽업: 날짜 기준 최신 1개만
                    const latestPick=events.filter(e=>e.gameId===g.id&&e.type==="픽업"&&e.date<=todayStr).sort((a,b)=>b.date.localeCompare(a.date))[0];
                    if(!latestUp&&!latestPick) return null;
                    // 표시명: character > extractPickupChar > fallback
                    const dispChar=p=>p&&(p.character||extractPickupChar(p.title,"")||"픽업");
                    return(
                      <div style={{padding:"1px 6px 4px",display:"flex",gap:3}}>
                        {latestUp&&<div onClick={()=>setSel(latestUp)} style={{fontSize:8,color:"#64b5f6",cursor:"pointer",flex:"1 1 0",minWidth:0,
                          background:"rgba(55,138,221,.08)",border:".5px solid rgba(55,138,221,.2)",borderRadius:3,padding:"2px 5px",
                          overflow:"hidden",textOverflow:"ellipsis",whiteSpace:"nowrap"}}>
                          🔄 {latestUp.version||"최신"} 업데이트{"  "}{latestUp.date&&<span style={{opacity:.6,fontSize:7}}>{latestUp.date.slice(5).replace("-","/")}~</span>}
                        </div>}
                        {latestPick&&<div onClick={()=>setSel(latestPick)} style={{fontSize:8,color:"#f48fb1",cursor:"pointer",flex:"1 1 0",minWidth:0,
                          background:"rgba(233,30,140,.08)",border:".5px solid rgba(233,30,140,.2)",borderRadius:3,padding:"2px 5px",
                          overflow:"hidden",textOverflow:"ellipsis",whiteSpace:"nowrap"}}>
                          ✦ {dispChar(latestPick)}
                        </div>}
                      </div>
                    );
                  })()}
                  <div style={{padding:"1px 6px 4px",display:"flex",alignItems:"center",gap:4}}>
                    <span className={isFetch?"pulse":""} style={{fontSize:9,color:stCol,flex:1,overflow:"hidden",textOverflow:"ellipsis",whiteSpace:"nowrap"}}>{stMsg}</span>
                    <button onClick={()=>setShowDbg(p=>p===g.id?null:g.id)} style={{background:"none",border:".5px solid var(--br)",borderRadius:3,color:"var(--tm)",fontSize:8,padding:"1px 5px",cursor:"pointer",fontFamily:"inherit"}}>{isOpen?"닫기":"로그"}</button>
                  </div>
                  {isOpen&&<pre style={{fontSize:8,color:"var(--ts)",background:"var(--bi)",margin:"0 5px 5px",borderRadius:4,padding:"5px 7px",overflow:"auto",maxHeight:150,whiteSpace:"pre-wrap",wordBreak:"break-all",lineHeight:1.5}}>{debugLog[g.id]||"(로그 없음)"}</pre>}
                  {/* 최근 소식 목록 - 별도 컴포넌트 (Rules of Hooks) */}
                  <GameNewsList events={events} gameId={g.id} onSel={setSel}/>
                </div>
              );
            })}

            {/* 문서 섹션 - 게임 목록 바로 아래 */}
            <div style={{borderTop:".5px solid var(--br)",marginTop:2}}>
              <div style={{display:"flex",alignItems:"center",padding:"6px 3px 3px",gap:4}}>
                <span style={{fontSize:11,fontWeight:700,color:"var(--tp)",flex:1}}>📝 문서 목록{noteLoading&&<span className="pulse" style={{fontSize:9,color:"#9B60FF",marginLeft:5,fontWeight:500}}>● 수집 중…</span>}</span>
                {notionTok&&<button onClick={()=>setQuickAdd({date:todayStr,docMode:true})}
                  style={{background:"rgba(120,80,255,.1)",border:".5px solid rgba(120,80,255,.3)",borderRadius:5,color:"#9B60FF",fontSize:12,padding:"2px 8px",cursor:"pointer",fontWeight:700}}>+</button>}
                <button onClick={fetchNotes}
                  style={{background:"var(--bi)",border:".5px solid var(--br)",borderRadius:5,color:"var(--ts)",fontSize:11,padding:"2px 6px",cursor:"pointer"}}>↻</button>
              </div>
              <div>
                {noteEvs.length===0
                  ?<div style={{fontSize:10,color:"var(--tm)",padding:"4px 3px",textAlign:"center"}}>문서 없음</div>
                  :noteEvs.map(n=>(
                    <div key={n.id} onClick={()=>setSelNote(n)}
                      style={{padding:"5px 3px 4px",cursor:"pointer",borderBottom:".5px solid var(--br)"}}
                      onMouseEnter={e=>e.currentTarget.style.background="var(--bh)"}
                      onMouseLeave={e=>e.currentTarget.style.background=""}>
                      <div style={{display:"flex",alignItems:"center",gap:4,marginBottom:2}}>
                        {n.category&&<span style={{fontSize:8,padding:"0 4px",borderRadius:4,...catStyle(n.category),flexShrink:0}}>{n.category}</span>}
                        <span style={{fontSize:11,color:"var(--tp)",overflow:"hidden",textOverflow:"ellipsis",whiteSpace:"nowrap"}}>{n.title}</span>
                      </div>
                      {n.gameNames?.length>0&&<div style={{fontSize:9,color:"var(--ts)",overflow:"hidden",textOverflow:"ellipsis",whiteSpace:"nowrap"}}>{n.gameNames.join(" · ")}</div>}
                      <div style={{fontSize:8,color:"var(--tm)",marginTop:1}}>{n.date}</div>
                    </div>
                  ))
                }
              </div>
            </div>

          </div>

        </div>{/* /Sidebar */}

        {/* Main */}
        <div style={{flex:1,display:"flex",flexDirection:"column",overflow:"hidden",minWidth:0}}>
          {view==="settings"
            ?<SettingsPanel token={notionTok} setToken={setNotionTok}
              dbId={notionDbId} setDbId={setNotionDbId}
              broadcastDbId={broadcastDbId} setBroadcastDbId={setBroadcastDbId}
              noteDbId={noteDbId} setNoteDbId={setNoteDbId}
              onSave={()=>{store.set("v146_t",notionTok);store.set("v60_dbid",notionDbId);store.set("v60_bcid",broadcastDbId);store.set("v60_nid",noteDbId);showToast("저장됐습니다.");}}
              onBulkSync={bulkSyncNotion}
              onFetchBroadcast={fetchBroadcast}
              onFetchNotes={fetchNotes}
              onSearchDbs={searchNotionDbs}
              onSetup={async()=>{
                if(!notionTok){showToast("Integration Token을 먼저 입력해주세요.");return;}
                showToast("Notion 구조 생성 중...");
                try{
                  const r=await fetch(`${API}/api/notion-setup`,{
                    method:"POST",
                    headers:{"Authorization":"Bearer "+notionTok,"Content-Type":"application/json","Notion-Version":"2022-06-28"}
                  });
                  const d=await r.json();
                  if(!r.ok) throw new Error(d.error||"setup failed");
                  setNotionDbId(d.calendarDbId.replace(/-/g,""));
                  setBroadcastDbId(d.calendarDbId.replace(/-/g,""));
                  const docId=d.documentDbId.replace(/-/g,"");
                  setNoteDbId(docId);
                  // calendarDbId stored via setNotionDbId
                  store.set("v60_bcid",d.calendarDbId.replace(/-/g,""));
                  store.set("v60_nid",docId);
                  showToast("✓ Notion 구조 생성 완료! 스트리밍 달력·문서 목록·게임 목록 DB가 만들어졌습니다.");
                }catch(e){showToast("초기 설정 실패: "+e.message);}
              }}
              onFetchSchema={async()=>{
                const dbId=broadcastDbId||notionDbId;
                if(!notionTok||!dbId){showToast("Token과 DB ID를 먼저 입력해주세요.");return;}
                try{
                  const r=await fetch(`${API}/api/notion?path=databases/${encodeURIComponent(dbId)}`,{headers:{"Authorization":"Bearer "+notionTok,"Notion-Version":"2022-06-28"}});
                  const d=await r.json();
                  if(d.message) throw new Error(d.message);
                  const props=Object.entries(d.properties||{}).map(([n,p])=>"["+p.type+"] "+n).join("\n");
                  setFullLog(p=>[...p,"=== DB 속성 ===",props,"==="]);
                  showToast("DB 속성 → 전체 로그 확인");
                }catch(e){showToast("읽기 실패: "+e.message);}
              }}/>
            :<div style={{flex:1,overflow:"hidden",display:"flex",position:"relative"}}>
              <div ref={calRef} style={{flex:1,overflow:"auto",padding:"5px 6px"}}>
                <div style={{display:"grid",gridTemplateColumns:"repeat(7,1fr)",gap:2,marginBottom:2}}>
                  {(weekStart===1?["월","화","수","목","금","토","일"]:["일","월","화","수","목","금","토"]).map((d,i)=><div key={d} style={{textAlign:"center",fontSize:10,fontWeight:600,padding:"3px 0",color:d==="일"?"#E24B4A":d==="토"?"#5090D3":"var(--ts)"}}>{d}</div>)}
                </div>
                {weekRows.map((week,rowIdx)=>{
                  const isHov=rowIdx===focusWeek; // 호버 강조 (크기 변화 없음)
                  const containsToday=week.some(c=>c.ds===todayStr);
                  return(
                    <div key={rowIdx} ref={el=>{if(el)weekRefs.current[rowIdx]=el;}}
                      onMouseEnter={()=>setFocusWeek(rowIdx)}
                      className={`${isHov?"week-row-hov":""} ${rowIdx===expandedWeek?"week-row-expanded":""}`}
                      style={{display:"grid",gridTemplateColumns:"repeat(7,1fr)",gap:2,marginBottom:2,borderRadius:8,padding:"2px",transition:"outline .2s,background .2s"}}>
                      {week.map((cell,ci)=>{
                        const isToday=cell.ds===todayStr,isSelDay=cell.cur&&cell.day===selDay&&isHov;
                        const allCellEvs=cellEvs(cell);
                        const bcEvs=allCellEvs.filter(e=>e.isBroadcast);
                        const noteEvsCel=noteEvs.filter(e=>e.date===cell.ds);
                        const gameEvs=allCellEvs.filter(e=>!e.isBroadcast);
                        const isExpanded=(rowIdx===expandedWeek);
                        const maxGameEvs=isExpanded?9999:Math.max(0,6-bcEvs.length);
                        return(
                          <div key={cell.ds}
                            onMouseEnter={()=>cell.cur&&setHoverDs(cell.ds)}
                            onMouseLeave={()=>setHoverDs(null)}
                            onClick={()=>{if(!cell.cur){setScrollToDate(cell.ds);setYr(cell.yr);setMo(cell.mo);return;}setFocusWeek(rowIdx);setSelDay(cell.day);smoothScrollToRow(rowIdx);setExpandedWeek(p=>p===rowIdx?null:rowIdx);}}
                            className="week-cell"
                            style={{minHeight:180,background:isSelDay?"rgba(55,138,221,.12)":"var(--bc)",borderRadius:6,outline:isToday?"2px solid #00C9A7":".5px solid var(--br)",padding:"5px 4px 3px",cursor:"pointer",overflow:"hidden",opacity:cell.cur?1:isHov?.7:.35,position:"relative"}}>
                            {/* 일정 추가 버튼 */}
                            {hoverDs===cell.ds&&notionTok&&(
                              <button onClick={e=>{e.stopPropagation();setQuickAdd({date:cell.ds});}}
                                style={{position:"absolute",top:4,right:4,zIndex:10,width:24,height:24,borderRadius:"50%",background:"#378ADD",color:"#fff",border:"none",cursor:"pointer",fontSize:16,lineHeight:"24px",textAlign:"center",fontWeight:700,padding:0,boxShadow:"0 2px 6px rgba(55,138,221,.5)"}}>
                                +
                              </button>
                            )}
                            <div style={{display:"flex",alignItems:"center",gap:3,marginBottom:4,fontSize:12,fontWeight:isToday?700:500,paddingRight:hoverDs===cell.ds&&notionTok?26:0,
                                color:isToday?"#00C9A7":((ci+weekStart)%7===0)?"#E24B4A":((ci+weekStart)%7===6)?"#5090D3":"var(--ts)"}}>
                              <span style={{fontSize:9,color:"var(--tm)"}}>{(weekStart===1?["월","화","수","목","금","토","일"]:["일","월","화","수","목","금","토"])[ci]}</span>
                              <span>{cell.day}</span>
                              {!cell.cur&&<span style={{fontSize:8,color:"var(--tm)"}}>{cell.mo+1}월</span>}
                              {isToday&&<span style={{fontSize:8,padding:"1px 4px",borderRadius:20,background:"#00C9A7",color:"#fff",fontWeight:700,marginLeft:1}}>TODAY</span>}
                            </div>
                            {/* 방송 일정 */}
                            {showBcastInCal&&bcEvs.map(ev=>(
                              <BroadcastCard key={ev.id} ev={ev} onClick={e=>{e.stopPropagation();setSel(ev);}}/>
                            ))}
                            {/* 노트 (showNotesInCal이 true일 때만 표시) */}
                            {showNotesInCal&&noteEvsCel.map(note=>(
                              <div key={note.id} onClick={e=>{e.stopPropagation();setSelNote(note);}}
                                style={{background:"rgba(120,80,255,.08)",border:".5px solid rgba(120,80,255,.25)",borderRadius:4,padding:"3px 6px",marginBottom:2,cursor:"pointer"}}>
                                <div style={{display:"flex",alignItems:"center",gap:3,marginBottom:1}}>
                                  <span style={{fontSize:9}}>📝</span>
                                  {note.category&&<span style={{fontSize:8,padding:"0 3px",borderRadius:3,...catStyle(note.category)}}>{note.category}</span>}
                                </div>
                                <div style={{fontSize:10,color:"var(--tp)",overflow:"hidden",textOverflow:"ellipsis",whiteSpace:"nowrap",fontWeight:500}}>{note.title}</div>
                                {note.gameNames?.length>0&&<div style={{fontSize:8,color:"rgba(120,80,255,.7)",marginTop:1,overflow:"hidden",textOverflow:"ellipsis",whiteSpace:"nowrap"}}>{note.gameNames.join(" · ")}</div>}
                              </div>
                            ))}
                            {/* 게임 이벤트 */}
                            {gameEvs.slice(0,maxGameEvs).map((ev,evIdx)=>(
                              <ExpandedCard key={ev.id} ev={ev} game={gOf(ev.gameId)} cellDs={cell.ds}
                                className={isExpanded&&evIdx>=Math.max(0,6-bcEvs.length)?"evt-appear":""}
                                style={{animationDelay:isExpanded&&evIdx>=Math.max(0,6-bcEvs.length)?`${(evIdx-Math.max(0,6-bcEvs.length))*0.04}s`:undefined}}
                                onClick={e=>{e.stopPropagation();setSel(ev);}}/>
                            ))}
                            {!isExpanded&&gameEvs.length>maxGameEvs&&(
                              <div onClick={e=>{e.stopPropagation();setExpandedWeek(rowIdx);smoothScrollToRow(rowIdx);}}
                                style={{fontSize:9,color:"#378ADD",paddingLeft:2,cursor:"pointer",padding:"2px 5px",borderRadius:4,background:"rgba(55,138,221,.1)"}}>
                                +{gameEvs.length-maxGameEvs} 더보기
                              </div>
                            )}
                          </div>
                        );
                      })}
                    </div>
                  );
                })}
              </div>
              {/* QuickAdd 모달 */}
              {quickAdd&&<QuickAddModal
                date={quickAdd.date}
                editEv={quickAdd.editEv||null}
                docMode={quickAdd.docMode||false}
                broadcastEvs={broadcastEvs}
                noteEvs={noteEvs}
                gameIndex={gameIndex}
                gameNames={gameNames}
                events={events}
                games={games}
                notionTok={notionTok}
                broadcastDbId={notionDbId}
                noteDbId={noteDbId}
                showToast={showToast}
                onClose={()=>setQuickAdd(null)}
                onSuccess={(type,isEdit)=>{showToast(isEdit?"수정 완료":(type==="방송"?"방송 일정 추가됨":"노트 추가됨"));setQuickAdd(null);if(type==="방송")fetchBroadcast();else fetchNotes();}}
              />}
              {/* NoteDetailModal */}
              {selNote&&<NoteDetailModal note={selNote} gameIndex={gameIndex} gameNames={gameNames} notionTok={notionTok}
              onClose={()=>setSelNote(null)}
              onSaved={()=>{setSelNote(null);showToast("저장됐습니다.");fetchNotes();}}
              onDeleted={()=>{setSelNote(null);showToast("삭제됐습니다.");fetchNotes();}}/>}
              {sel&&(
                <div style={{position:"absolute",inset:0,background:"rgba(0,0,0,.55)",zIndex:50,display:"flex",alignItems:"center",justifyContent:"center",padding:20}} onClick={()=>setSel(null)}>
                  <div style={{width:400,maxHeight:"82vh",borderRadius:14,background:"var(--bc)",border:".5px solid var(--br)",display:"flex",flexDirection:"column",overflow:"hidden",boxShadow:"0 8px 40px rgba(0,0,0,.5)"}} onClick={e=>e.stopPropagation()}>
                    {/* 배너 이미지 — 클릭 시 링크 이동 */}
                    {(sel.characterImg||getYtId(sel.youtubeUrl))&&(()=>{
                      const ytid=getYtId(sel.youtubeUrl);
                      const imgSrc=ytid?`https://img.youtube.com/vi/${ytid}/maxresdefault.jpg`:sel.characterImg;
                      const linkUrl=sel.youtubeUrl||sel.detail;
                      return(
                        <div style={{position:"relative",height:180,overflow:"hidden",background:"#000",flexShrink:0,cursor:linkUrl?"pointer":"default"}}
                          onClick={()=>linkUrl&&window.open(linkUrl,"_blank")}>
                          <img src={imgSrc} alt="" onError={e=>{if(ytid&&imgSrc.includes("maxresdefault"))e.target.src=`https://img.youtube.com/vi/${ytid}/mqdefault.jpg`;else e.target.parentElement.style.display="none";}} style={{width:"100%",height:"100%",objectFit:"cover",objectPosition:"center top"}}/>
                          <div style={{position:"absolute",inset:0,background:"linear-gradient(to bottom,transparent 40%,rgba(0,0,0,.7))"}}/>
                          {ytid&&<span style={{position:"absolute",top:8,right:8,background:"rgba(0,0,0,.8)",borderRadius:6,padding:"2px 8px",fontSize:10,color:"#ff5555",fontWeight:600}}>▶ YouTube</span>}
                          {linkUrl&&!ytid&&<span style={{position:"absolute",top:8,right:8,background:"rgba(0,0,0,.6)",borderRadius:6,padding:"2px 8px",fontSize:9,color:"#fff"}}>클릭하여 이동 ↗</span>}
                      <div style={{position:"absolute",top:8,left:8,width:22,height:22,borderRadius:5,background:sel.gameColor||"#333",overflow:"hidden",boxShadow:"0 1px 6px rgba(0,0,0,.5)"}}>
                        {gOf(sel.gameId)?.icon&&<img src={gOf(sel.gameId).icon} alt="" onError={e=>e.target.style.display="none"} style={{width:22,height:22,objectFit:"cover"}}/>}
                      </div>
                          <div style={{position:"absolute",bottom:8,left:10,right:10}}>
                            <span style={{fontSize:12,color:"#fff",fontWeight:600,lineHeight:1.3,display:"block",textShadow:"0 1px 4px rgba(0,0,0,.8)"}}>{(sel.type==="픽업"&&sel.character)?sel.character:sel.title}</span>
                          </div>
                        </div>
                      );
                    })()}
                    {/* 헤더 */}
                    <div style={{display:"flex",alignItems:"center",justifyContent:"space-between",padding:"10px 14px 8px",borderBottom:".5px solid var(--br)",flexShrink:0}}>
                      <div style={{display:"flex",alignItems:"center",gap:6}}>
                        {gOf(sel.gameId)?.icon&&<img src={gOf(sel.gameId).icon} alt="" onError={e=>e.target.style.display="none"} style={{width:18,height:18,borderRadius:4,objectFit:"cover",flexShrink:0}}/>}
                        <span style={{fontSize:11,color:"var(--ts)"}}>{sel.gameName}</span>
                        {sel.type&&<span style={{fontSize:10,padding:"2px 8px",borderRadius:20,background:tb(sel.type),color:tc(sel.type)}}>{sel.type}</span>}
                      </div>
                      <button className="ib" onClick={()=>setSel(null)} style={{fontSize:18}}>×</button>
                    </div>
                    {/* 본문 */}
                    <div style={{flex:1,overflow:"auto",padding:"12px 16px"}}>
                      {!sel.characterImg&&!getYtId(sel.youtubeUrl)&&<p style={{fontSize:14,fontWeight:600,marginBottom:10,color:"var(--tp)",lineHeight:1.4}}>{(sel.type==="픽업"&&sel.character)?sel.character:sel.title}</p>}
                      <div style={{display:"flex",flexDirection:"column",gap:6,marginBottom:12}}>
                        {[["기간",sel.date+(sel.endDate&&sel.endDate!==sel.date?" ~ "+sel.endDate:"")],["버전",sel.version],["픽업 캐릭터",(sel.type==="픽업")?null:sel.character]].filter(kv=>kv[1]).map(kv=>(
                          <div key={kv[0]} style={{display:"flex",justifyContent:"space-between",gap:8,padding:"5px 8px",background:"var(--bh)",borderRadius:6}}>
                            <span style={{fontSize:11,color:"var(--tm)",flexShrink:0}}>{kv[0]}</span>
                            <span style={{fontSize:11,color:"var(--tp)",textAlign:"right"}}>{kv[1]}</span>
                          </div>
                        ))}
                      </div>
                      {sel.youtubeUrl&&!getYtId(sel.youtubeUrl)&&<a href={sel.youtubeUrl} target="_blank" rel="noreferrer" style={{display:"flex",alignItems:"center",gap:5,padding:"8px 12px",borderRadius:8,background:"rgba(229,57,53,.1)",color:"#e53935",fontSize:11,marginBottom:12,border:".5px solid rgba(229,57,53,.3)"}}>▶ 영상 보기 ↗</a>}
                      {sel.detail&&<a href={sel.detail} target="_blank" rel="noreferrer" style={{display:"flex",alignItems:"center",gap:5,padding:"8px 12px",borderRadius:8,background:"var(--bh)",color:"#378ADD",fontSize:11,marginBottom:12,border:".5px solid rgba(55,138,221,.25)"}}>🔗 공식 페이지 ↗</a>}
                      {sel.isBroadcast&&sel.notionPageId&&<BroadcastInlineEdit
                        ev={sel} gameIndex={gameIndex} gameNames={gameNames}
                        events={events} games={games} notionTok={notionTok}
                        onClose={()=>setSel(null)}
                        onSaved={()=>{setSel(null);showToast("저장됐습니다.");fetchBroadcast();}}
                        onDeleted={()=>{setSel(null);showToast("삭제됐습니다.");fetchBroadcast();}}
                      />}
                      {notionTok&&(sel.type==="업데이트"||sel.type==="특별 방송")&&!sel.isBroadcast&&
                      <button onClick={()=>!sel.synced&&syncing[sel.id]!=="pending"&&syncNotion(sel)} disabled={sel.synced||syncing[sel.id]==="pending"}
                        style={{width:"100%",padding:"9px",fontSize:12,display:"flex",alignItems:"center",justifyContent:"center",gap:6,borderRadius:8,cursor:sel.synced?"default":"pointer",fontFamily:"inherit",background:sel.synced?"rgba(15,157,117,.12)":"var(--bh)",color:sel.synced?"#0F9D75":"var(--ts)",border:sel.synced?".5px solid rgba(15,157,117,.35)":".5px solid var(--br)"}}>
                        {sel.synced?"✓ 노션 등록됨":syncing[sel.id]==="pending"?"동기화 중...":"📤 노션에 등록"}
                      </button>}
                    </div>
                  </div>
                </div>
              )}
            </div>
          }
        </div>
      </div>

      {showGuide&&<ProtocolGuide onClose={()=>setShowGuide(false)}/>}

      {gDetail&&<GameDetailModal
        game={games.find(g=>g.id===gDetail.id)||gDetail}
        fetchSt={fetchSt} debugLog={debugLog}
        evCount={events.filter(e=>e.gameId===gDetail.id).length}
        onRefetch={()=>{const g=games.find(x=>x.id===gDetail.id);if(g)doFetch(g);}}
        onSave={upd=>{setGames(p=>p.map(g=>g.id===gDetail.id?{...g,...upd}:g));setGDetail(null);}}
        onDelete={()=>{if(window.confirm(gDetail.name+"을(를) 삭제할까요?")){setGames(p=>p.filter(g=>g.id!==gDetail.id));setEvents(p=>p.filter(e=>e.gameId!==gDetail.id));if(sel?.gameId===gDetail.id)setSel(null);setGDetail(null);}}}
        onClose={()=>setGDetail(null)}/>}
    </div>
  );
}

// 방송 일정 카드 (노션 캘린더 연동)
function QuickAddModal({date,editEv,docMode,broadcastEvs,noteEvs,gameIndex,gameNames,events,games,notionTok,broadcastDbId,noteDbId,showToast,onClose,onSuccess}){
  const isEdit=!!editEv;
  const isNote=isEdit&&editEv.isNote;
  // docMode=true이면 노트 전용 (사이드바 + 버튼)
  React.useEffect(()=>{if(docMode&&!isEdit) setType("노트");},[docMode]);
  const [type,setType]=React.useState(isEdit?(isNote?"노트":"방송"):"방송");
  // 방송 필드 초기값
  const initTime=()=>{if(editEv?.timeStr){const m=editEv.timeStr.match(/(\d+)(?::(\d+))?시/);if(m){const h=Number(m[1])+(editEv.timeStr.includes("오후")&&Number(m[1])<12?12:0);return `${String(h).padStart(2,"0")}:${m[2]||"00"}`;}};return"19:00";};
  const [bcTitle,setBcTitle]=React.useState(editEv&&!isNote?editEv._rawTitle||editEv.title:"방송");
  const [bcTime,setBcTime]=React.useState(initTime());
  const [bcTags,setBcTags]=React.useState(editEv&&!isNote?(editEv.tags||["방송"]):["방송"]);
  const [bcEp,setBcEp]=React.useState(editEv?.episode||"");
  const [bcGame,setBcGame]=React.useState(editEv&&!isNote?(editEv.gameNames?.[0]||""):"");
  const [bcVer,setBcVer]=React.useState(editEv?.version||"");
  // 노트 필드
  const [noteTitle,setNoteTitle]=React.useState(editEv?.title||"");
  const [noteCat,setNoteCat]=React.useState(editEv?.category||"메모");
  const [noteGame,setNoteGame]=React.useState(editEv?.gameNames?.[0]||"");
  const [saving,setSaving]=React.useState(false);

  // 스마트 기본값: 해당 날짜 방송의 게임 자동 선택
  React.useEffect(()=>{
    if(isEdit) return;
    const bc=broadcastEvs.find(e=>e.date===date&&e.gameNames?.length>0);
    if(bc){const g=bc.gameNames[0];setBcGame(g);setNoteGame(g);}
  },[date]);

  // 버전 자동 감지: 선택한 게임의 최신 업데이트 버전
  React.useEffect(()=>{
    if(!bcGame||bcVer) return;
    const game=(games||[]).find(g=>g.name===bcGame);
    if(!game) return;
    const latest=(events||[]).filter(e=>e.gameId===game.id&&e.version&&e.type==="업데이트").sort((a,b)=>b.date.localeCompare(a.date))[0];
    if(latest?.version) setBcVer(String(latest.version));
  },[bcGame]);

  // 최근 노트 (게임 기준)
  const recentNotes=React.useMemo(()=>{
    const rid=gameIndex?.get(noteGame); if(!rid) return [];
    return noteEvs.filter(n=>(n.gameRelIds||[]).includes(rid)).slice(0,6);
  },[noteGame,noteEvs,gameIndex]);

  const TAG_LIST=["방송","합방","메인 스토리","원스동","개처망한세계","서브스토리","특별 방송"];

  async function submit(){
    if(saving) return; setSaving(true);
    try{
      let props={};
      if(type==="방송"){
        if(!bcTitle.trim()){showToast("컨텐츠명을 입력해주세요.");setSaving(false);return;}
        const dateTime=`${date}T${bcTime}:00.000+09:00`;
        props={
          "컨텐츠":{title:[{text:{content:bcTitle.trim()}}]},
          "날짜":{date:{start:dateTime}},
          "컨텐츠 종류":{multi_select:bcTags.map(t=>({name:t}))},
        };
        if(bcEp) props["컨텐츠 회차"]={number:Number(bcEp)};
        if(bcVer) props["버전"]={rich_text:[{text:{content:bcVer}}]};
        const rid=gameIndex?.get(bcGame); if(rid) props["게임"]={relation:[{id:rid}]};
      }else{
        if(!noteTitle.trim()){showToast("제목을 입력해주세요.");setSaving(false);return;}
        props={"문서명":{title:[{text:{content:noteTitle.trim()}}]},"분류":{select:{name:noteCat}}};
        const rid=gameIndex?.get(noteGame); if(rid) props["게임 목록"]={relation:[{id:rid}]};
      }
      let r;
      if(isEdit&&editEv.notionPageId){
        r=await fetch(`${API}/api/notion?path=pages/${editEv.notionPageId}`,{
          method:"PATCH",headers:{"Authorization":"Bearer "+notionTok,"Content-Type":"application/json","Notion-Version":"2022-06-28"},
          body:JSON.stringify({properties:props})
        });
      }else{
        const dbId=type==="방송"?(broadcastDbId||"1de66cc1-f1b5-81c7-a69c-c00da09d16c4"):(noteDbId||"20466cc1-f1b5-8060-b379-eb16721bd1e4");
        r=await fetch(`${API}/api/notion?path=pages`,{
          method:"POST",headers:{"Authorization":"Bearer "+notionTok,"Content-Type":"application/json","Notion-Version":"2022-06-28"},
          body:JSON.stringify({parent:{database_id:dbId},properties:props})
        });
      }
      if(r.ok) onSuccess(type,isEdit);
      else{const je=await r.json().catch(()=>({}));showToast((isEdit?"수정":"추가")+" 실패: "+(je.message||r.status));}
    }catch(e){showToast("오류: "+e.message);}
    setSaving(false);
  }

  const S={label:{fontSize:11,color:"var(--ts)",display:"block",marginBottom:3,fontWeight:500}};
  return(<div onClick={onClose} style={{position:"fixed",inset:0,background:"rgba(0,0,0,.6)",zIndex:300,display:"flex",alignItems:"center",justifyContent:"center",padding:16}}>
    <div onClick={e=>e.stopPropagation()} style={{background:"var(--bc)",borderRadius:12,padding:20,width:380,maxWidth:"100%",border:".5px solid var(--br)",boxShadow:"0 8px 40px rgba(0,0,0,.5)",maxHeight:"85vh",overflowY:"auto"}}>
      <div style={{display:"flex",alignItems:"center",marginBottom:14}}>
        <div>
          <div style={{fontSize:13,fontWeight:700,color:"var(--tp)"}}>{isEdit?"수정":"추가"}: {date}</div>
          {!isEdit&&type==="노트"&&<div style={{fontSize:9,color:"var(--tm)",marginTop:1}}>📌 노트는 오늘 날짜로 생성됩니다 (Notion 제약)</div>}
        </div>
        <button onClick={onClose} style={{marginLeft:"auto",background:"none",border:"none",color:"var(--ts)",fontSize:16,cursor:"pointer"}}>✕</button>
      </div>
      {!isEdit&&type==="방송"&&<div style={{fontSize:10,color:"var(--ts)",marginBottom:10,padding:"6px 8px",borderRadius:6,background:"var(--bi)"}}>
        📺 방송 일정 추가 — 문서는 사이드바 "문서 목록"에서 추가하세요
      </div>}
      {type==="방송"?(
        <div style={{display:"flex",flexDirection:"column",gap:10}}>
          <div><label style={S.label}>컨텐츠명</label>
            <input value={bcTitle} onChange={e=>setBcTitle(e.target.value)} className="inp" placeholder="방송, 소울마스크, EP5 등"/></div>
          <div style={{display:"flex",gap:8}}>
            <div style={{flex:1}}><label style={S.label}>시간</label>
              <input type="time" value={bcTime} onChange={e=>setBcTime(e.target.value)} className="inp"/></div>
            <div style={{flex:1}}><label style={S.label}>회차</label>
              <input type="number" value={bcEp} onChange={e=>setBcEp(e.target.value)} className="inp" placeholder="숫자"/></div>
          </div>
          <div style={{display:"flex",gap:8}}>
            <div style={{flex:2}}><label style={S.label}>게임</label>
              <select value={bcGame} onChange={e=>setBcGame(e.target.value)} disabled={!notionTok} className="inp">
                <option value="">선택 안함</option>
                {gameNames.map(g=><option key={g} value={g}>{g}</option>)}
              </select></div>
            <div style={{flex:1}}><label style={S.label}>버전 {!bcVer&&<span style={{opacity:.6,fontSize:9}}>(자동감지)</span>}</label>
              <input value={bcVer} onChange={e=>setBcVer(e.target.value)} className="inp" placeholder="4.3"/></div>
          </div>
          <div><label style={S.label}>태그</label>
            <div style={{display:"flex",flexWrap:"wrap",gap:5}}>
              {TAG_LIST.map(t=>{const on=bcTags.includes(t);return(
                <button key={t} onClick={()=>setBcTags(p=>on?p.filter(x=>x!==t):[...p,t])}
                  style={{fontSize:10,padding:"3px 9px",borderRadius:12,cursor:"pointer",fontFamily:"inherit",border:".5px solid",
                    background:on?"rgba(255,180,50,.15)":"var(--bi)",color:on?"#c07000":"var(--ts)",borderColor:on?"#FFB432":"var(--br)"}}>
                  {t}</button>);})}
            </div></div>
        </div>
      ):(
        <div style={{display:"flex",flexDirection:"column",gap:10}}>
          <div><label style={S.label}>제목</label>
            <input value={noteTitle} onChange={e=>setNoteTitle(e.target.value)} className="inp" placeholder="문서 제목"/></div>
          <div style={{display:"flex",gap:8}}>
            <div style={{flex:1}}><label style={S.label}>분류</label>
              <select value={noteCat} onChange={e=>setNoteCat(e.target.value)} className="inp">
                {["메모","대본","정리"].map(c=><option key={c} value={c}>{c}</option>)}
              </select></div>
            <div style={{flex:1}}><label style={S.label}>게임</label>
              <select value={noteGame} onChange={e=>setNoteGame(e.target.value)} className="inp">
                <option value="">선택 안함</option>
                {gameNames.map(g=><option key={g} value={g}>{g}</option>)}
              </select></div>
          </div>
          {recentNotes.length>0&&<div>
            <label style={S.label}>📝 최근 노트 (클릭 → Notion)</label>
            <div style={{display:"flex",flexDirection:"column",gap:4,maxHeight:130,overflowY:"auto"}}>
              {recentNotes.map(n=>(
                <div key={n.id} onClick={()=>window.open(n.notionUrl,"_blank")}
                  style={{padding:"5px 9px",borderRadius:6,background:"var(--bi)",border:".5px solid var(--br)",cursor:"pointer",fontSize:11,color:"var(--tp)"}}>
                  <span style={{opacity:.6,fontSize:9,marginRight:4}}>[{n.category||"메모"}]</span>{n.title}
                  <span style={{float:"right",opacity:.5,fontSize:9}}>{n.date}</span>
                </div>
              ))}
            </div>
          </div>}
        </div>
      )}
      <button onClick={submit} disabled={saving}
        style={{width:"100%",marginTop:14,padding:"10px 0",borderRadius:8,cursor:saving?"not-allowed":"pointer",fontFamily:"inherit",fontSize:12,fontWeight:600,
          background:saving?"var(--bi)":(type==="방송"?"rgba(255,180,50,.2)":"rgba(120,80,255,.15)"),
          color:saving?"var(--ts)":(type==="방송"?"#c07000":"#7b35cc"),
          border:".5px solid "+(type==="방송"?"#FFB432":"#9B60FF")}}>
        {saving?"저장 중...":(isEdit?"수정 저장":(type==="방송"?"📺 방송 일정 추가":"📝 노트 추가"))}
      </button>
    </div>
  </div>);
}

function BroadcastInlineEdit({ev,gameIndex,gameNames,events,games,notionTok,onClose,onSaved,onDeleted}){
  const initTime=()=>{if(ev.timeStr){const m=ev.timeStr.match(/(\d+)(?::(\d+))?시/);if(m){const h=Number(m[1])+(ev.timeStr.includes("오후")&&Number(m[1])<12?12:0);return`${String(h).padStart(2,"0")}:${m[2]||"00"}`;}}return"19:00";};
  const [title,setTitle]=React.useState(ev._rawTitle||ev.title||"방송");
  const [time,setTime]=React.useState(initTime());
  const [bcGame,setBcGame]=React.useState(ev.gameNames?.[0]||"");
  const [ver,setVer]=React.useState(ev.version||"");
  const [ep,setEp]=React.useState(ev.episode||"");
  const [tags,setTags]=React.useState(ev.tags||["방송"]);
  const [saving,setSaving]=React.useState(false);
  const TAG_LIST=["방송","합방","메인 스토리","원스동","개처망한세계","서브스토리","특별 방송"];
  // 버전 자동 감지
  React.useEffect(()=>{
    if(!bcGame||ver) return;
    const g=(games||[]).find(x=>x.name===bcGame);if(!g) return;
    const v=(events||[]).filter(e=>e.gameId===g.id&&e.version&&e.type==="업데이트").sort((a,b)=>b.date.localeCompare(a.date))[0];
    if(v?.version) setVer(String(v.version));
  },[bcGame]);
  async function save(){
    setSaving(true);
    const dateTime=`${ev.date}T${time}:00.000+09:00`;
    const props={
      "컨텐츠":{title:[{text:{content:title.trim()}}]},
      "날짜":{date:{start:dateTime}},
      "컨텐츠 종류":{multi_select:tags.map(t=>({name:t}))},
    };
    if(ep) props["컨텐츠 회차"]={number:Number(ep)};
    if(ver) props["버전"]={rich_text:[{text:{content:ver}}]};
    const rid=gameIndex?.get(bcGame); if(rid) props["게임"]={relation:[{id:rid}]};
    const r=await fetch(`${API}/api/notion?path=pages/${ev.notionPageId}`,{
      method:"PATCH",headers:{"Authorization":"Bearer "+notionTok,"Content-Type":"application/json","Notion-Version":"2022-06-28"},
      body:JSON.stringify({properties:props})
    });
    setSaving(false); if(r.ok) onSaved();
  }
  const [confirmDel,setConfirmDel]=React.useState(false);
  async function doDelete(){
    setSaving(true);
    try{
      const r=await fetch(`${API}/api/notion?path=pages/${ev.notionPageId}`,{
        method:"PATCH",headers:{"Authorization":"Bearer "+notionTok,"Content-Type":"application/json","Notion-Version":"2022-06-28"},
        body:JSON.stringify({archived:true})
      });
      if(r.ok) onDeleted(); else{const e=await r.json().catch(()=>({}));setSaving(false);alert("삭제 실패: "+(e.message||r.status));}
    }catch(e){setSaving(false);alert("오류: "+e.message);}
  }
  const L={fontSize:10,color:"var(--ts)",display:"block",marginBottom:3,fontWeight:500};
  return(
    <div style={{borderTop:".5px solid var(--br)",paddingTop:12,marginTop:4}}>
      <div style={{fontSize:11,fontWeight:600,color:"#FFB432",marginBottom:10}}>✏️ 방송 일정 편집</div>
      <div style={{display:"flex",flexDirection:"column",gap:8}}>
        <div><label style={L}>컨텐츠명</label>
          <input value={title} onChange={e=>setTitle(e.target.value)} readOnly={!notionTok} className="inp"/></div>
        <div style={{display:"flex",gap:8}}>
          <div style={{flex:1}}><label style={L}>시간</label>
            <input type="time" value={time} onChange={e=>setTime(e.target.value)} readOnly={!notionTok} className="inp"/></div>
          <div style={{flex:1}}><label style={L}>회차</label>
            <input type="number" value={ep} onChange={e=>setEp(e.target.value)} readOnly={!notionTok} className="inp"/></div>
        </div>
        <div style={{display:"flex",gap:8}}>
          <div style={{flex:2}}><label style={L}>게임</label>
            <select value={bcGame} onChange={e=>setBcGame(e.target.value)} disabled={!notionTok} className="inp">
              <option value="">선택 안함</option>
              {(gameNames||[]).map(g=><option key={g}>{g}</option>)}
            </select></div>
          <div style={{flex:1}}><label style={L}>버전</label>
            <input value={ver} onChange={e=>setVer(e.target.value)} readOnly={!notionTok} className="inp" placeholder="자동감지"/></div>
        </div>
        <div><label style={L}>태그</label>
          <div style={{display:"flex",flexWrap:"wrap",gap:4}}>
            {TAG_LIST.map(t=>{const on=tags.includes(t);return(
              <button key={t} disabled={!notionTok} onClick={()=>setTags(p=>on?p.filter(x=>x!==t):[...p,t])}
                style={{fontSize:9,padding:"2px 7px",borderRadius:10,cursor:"pointer",fontFamily:"inherit",border:".5px solid",
                  background:on?"rgba(255,180,50,.15)":"var(--bi)",color:on?"#c07000":"var(--ts)",borderColor:on?"#FFB432":"var(--br)"}}>{t}</button>
            );})}
          </div></div>
      </div>
      {notionTok&&<div style={{display:"flex",gap:6,marginTop:10}}>
        {confirmDel
          ?<div style={{display:"flex",gap:4,alignItems:"center",background:"rgba(230,50,50,.08)",borderRadius:8,padding:"6px 10px",border:".5px solid rgba(230,50,50,.3)"}}>
            <span style={{fontSize:10,color:"#e64444",flex:1}}>정말 삭제할까요?</span>
            <button onClick={doDelete} disabled={saving} style={{padding:"4px 10px",borderRadius:6,background:"#e64444",color:"#fff",border:"none",cursor:"pointer",fontFamily:"inherit",fontSize:11,fontWeight:600}}>{saving?"삭제 중...":"삭제"}</button>
            <button onClick={()=>setConfirmDel(false)} style={{padding:"4px 8px",borderRadius:6,background:"var(--bi)",color:"var(--ts)",border:".5px solid var(--br)",cursor:"pointer",fontFamily:"inherit",fontSize:11}}>취소</button>
          </div>
          :<button onClick={()=>setConfirmDel(true)}
            style={{padding:"8px 12px",borderRadius:8,background:"rgba(230,50,50,.1)",color:"#e64444",border:".5px solid rgba(230,50,50,.3)",cursor:"pointer",fontFamily:"inherit",fontSize:11}}>
            🗑 삭제
          </button>}
        <button onClick={save} disabled={saving}
          style={{flex:1,padding:"8px 0",borderRadius:8,background:"rgba(255,180,50,.15)",color:"#c07000",border:".5px solid #FFB432",cursor:"pointer",fontFamily:"inherit",fontSize:12,fontWeight:600}}>
          {saving?"저장 중...":"💾 저장"}
        </button>
      </div>}
    </div>
  );
}

          {confirmDel
            ?<div style={{display:"flex",gap:4,alignItems:"center",background:"rgba(230,50,50,.08)",borderRadius:8,padding:"5px 8px",border:".5px solid rgba(230,50,50,.3)"}}>
              <span style={{fontSize:10,color:"#e64444",flex:1}}>정말 삭제할까요?</span>
              <button onClick={doDelete} disabled={saving} style={{padding:"4px 8px",borderRadius:6,background:"#e64444",color:"#fff",border:"none",cursor:"pointer",fontFamily:"inherit",fontSize:11,fontWeight:600}}>{saving?"삭제 중...":"확인"}</button>
              <button onClick={()=>setConfirmDel(false)} style={{padding:"4px 8px",borderRadius:6,background:"var(--bi)",color:"var(--ts)",border:".5px solid var(--br)",cursor:"pointer",fontFamily:"inherit",fontSize:11}}>취소</button>
            </div>
            :<button onClick={()=>setConfirmDel(true)}
              style={{padding:"8px 12px",borderRadius:8,background:"rgba(230,50,50,.1)",color:"#e64444",border:".5px solid rgba(230,50,50,.3)",cursor:"pointer",fontFamily:"inherit",fontSize:11}}>
              🗑 삭제
            </button>}
          <button onClick={save} disabled={saving}
            style={{flex:1,padding:"8px 0",borderRadius:8,background:"rgba(120,80,255,.15)",color:"#7b35cc",border:".5px solid rgba(120,80,255,.35)",cursor:"pointer",fontFamily:"inherit",fontSize:12,fontWeight:600}}>
            {saving?"저장 중...":"💾 저장"}
          </button></>}
        </div>
      </div>
    </div>
  );
}

function GameNewsList({events, gameId, onSel}) {
  const [open, setOpen] = React.useState(false);
  const TYPE_ICON={"업데이트":"🔄","픽업":"✦","특별 방송":"📡","영상":"▶","이벤트":"📌"};
  const TYPE_CLR={"업데이트":"#64b5f6","픽업":"#f48fb1","특별 방송":"#ffb74d","영상":"#ff5252","이벤트":"#a5d6a7"};
  const news = React.useMemo(()=>
    events.filter(e=>e.gameId===gameId&&e.type!=="영상")
      .sort((a,b)=>b.date.localeCompare(a.date))
  ,[events,gameId]);
  if(!news.length) return null;
  return(
    <div style={{borderTop:".5px solid var(--br)",marginTop:1}}>
      <button onClick={()=>setOpen(p=>!p)}
        style={{width:"100%",textAlign:"left",background:"none",border:"none",padding:"4px 7px",
          fontSize:9,color:"var(--tm)",cursor:"pointer",fontFamily:"inherit",
          display:"flex",justifyContent:"space-between",alignItems:"center"}}>
        <span>📋 최근 소식 ({news.length})</span>
        <span style={{fontSize:8}}>{open?"▲":"▼"}</span>
      </button>
      {open&&<div style={{maxHeight:200,overflow:"auto",padding:"0 5px 4px"}}>
        {news.map((ev,ni)=>(
          <div key={ni} onClick={()=>onSel(ev)}
            style={{display:"flex",alignItems:"flex-start",gap:4,padding:"3px 4px",
              marginBottom:1,borderRadius:4,cursor:"pointer",background:"var(--bi)"}}
            onMouseEnter={e=>e.currentTarget.style.background="var(--bh)"}
            onMouseLeave={e=>e.currentTarget.style.background="var(--bi)"}>
            <span style={{fontSize:9,color:TYPE_CLR[ev.type]||"#888",flexShrink:0,marginTop:1}}>
              {TYPE_ICON[ev.type]||"•"}
            </span>
            <div style={{flex:1,minWidth:0}}>
              <div style={{fontSize:8,color:"var(--tp)",overflow:"hidden",
                textOverflow:"ellipsis",whiteSpace:"nowrap",lineHeight:1.4}}>{ev.title}</div>
              <div style={{fontSize:7,color:"var(--tm)",opacity:.7}}>{ev.date}</div>
            </div>
          </div>
        ))}
      </div>}
    </div>
  );
}

function BroadcastCard({ev,onClick}){
  const isCollab=ev.isCollab||ev.tags?.includes("합방");
  const otherTags=(ev.tags||[]).filter(t=>t!=="방송"&&t!=="합방");
  return(
    <div onClick={onClick} style={{background:"rgba(255,180,50,.1)",border:".5px solid rgba(255,180,50,.35)",borderRadius:5,padding:"4px 6px 3px",marginBottom:3,cursor:"pointer",transition:"background .1s"}}
      onMouseEnter={e=>e.currentTarget.style.background="rgba(255,180,50,.18)"}
      onMouseLeave={e=>e.currentTarget.style.background="rgba(255,180,50,.1)"}>
      {/* 시간 + 합방 뱃지 */}
      <div style={{display:"flex",alignItems:"center",gap:4,marginBottom:2}}>
        <span style={{fontSize:9,color:"#FFB432",fontWeight:700,letterSpacing:"-.3px"}}>{ev.timeStr||"오후 7:00시"}</span>
        {isCollab&&<span style={{fontSize:8,padding:"0 4px",borderRadius:3,background:"rgba(255,80,80,.2)",color:"#FF7070",fontWeight:600,lineHeight:"14px"}}>합방</span>}
        {ev.episode>0&&<span style={{fontSize:8,color:"rgba(255,180,50,.7)",marginLeft:"auto"}}>#{ev.episode}</span>}
      </div>
      {/* 컨텐츠명 (게임명) */}
      <div style={{fontSize:11,fontWeight:600,color:"var(--tp)",overflow:"hidden",textOverflow:"ellipsis",whiteSpace:"nowrap",marginBottom:2}}>{ev.title}</div>
      {/* 게임 목록 (여러 게임인 경우) */}
      {ev.gameNames?.length>1&&<div style={{fontSize:8,color:"rgba(255,180,50,.7)",overflow:"hidden",textOverflow:"ellipsis",whiteSpace:"nowrap",marginBottom:2}}>{ev.gameNames.join(" · ")}</div>}
      {/* 기타 태그 */}
      {otherTags.length>0&&<div style={{display:"flex",gap:3,flexWrap:"wrap"}}>
        {otherTags.slice(0,3).map(t=><span key={t} style={{fontSize:8,color:"rgba(255,180,50,.7)",background:"rgba(255,180,50,.08)",padding:"0 4px",borderRadius:3,lineHeight:"14px"}}>{t}</span>)}
      </div>}
    </div>
  );
}

function CompactChip({ev,game,onClick}){
  return(<div onClick={onClick} className="chip" style={{background:tb(ev.type),color:tc(ev.type),borderLeft:`2px solid ${tbr(ev.type)}`,fontSize:11,padding:"3px 5px",marginBottom:2}}>
    {/* 게임 아이콘: 컬러 배경 항상 표시 + 아이콘 오버레이 */}
    <div style={{width:14,height:14,borderRadius:3,background:ev.gameColor||"#666",flexShrink:0,position:"relative",overflow:"hidden"}}>
      {game?.icon&&<img src={game.icon} alt="" onError={e=>e.target.style.display="none"} style={{position:"absolute",inset:0,width:14,height:14,objectFit:"cover"}}/>}
    </div>
    <span style={{flex:1,overflow:"hidden",textOverflow:"ellipsis",whiteSpace:"nowrap"}}>
      {(()=>{
        const char=ev.type==="픽업"?extractPickupChar(ev.title):null;
        return char
          ?<><span style={{opacity:.75,fontSize:9}}>{ev.title.replace(char,'').replace(/「」/,'').trim().slice(0,15)||ev.type}</span><span style={{fontWeight:700,color:tc(ev.type)}}> {char}</span></>
          :<>{ev.title}</>;
      })()}
    </span>
    {ev._count>1&&<span style={{fontSize:8,padding:"0 3px",borderRadius:8,background:"rgba(0,0,0,.25)",flexShrink:0}}>+{ev._count-1}</span>}
    {ev.youtubeUrl&&<span style={{flexShrink:0,display:"inline-flex",alignItems:"center"}} title={ev.isShort?"Shorts":"YouTube"}><svg width="11" height="11" viewBox="0 0 24 24" fill={ev.isShort?"#ff9800":"#FF0000"}><path d="M8 5v14l11-7z"/></svg></span>}
  </div>);
}

function ExpandedCard({ev,game,cellDs,onClick,className,style:extraStyle}){
  // ★ 업데이트 적용일 마커: 간결한 "업데이트 적용" 표시
  if(ev._isApplyMarker){
    return(<div onClick={onClick} className={`ecard${className?" "+className:""}`}
      style={{border:`1px solid ${tbr("업데이트")}66`,background:tbr("업데이트")+"22",...(extraStyle||{})}}>
      <div style={{padding:"5px 7px",display:"flex",alignItems:"center",gap:5}}>
        <div style={{width:16,height:16,borderRadius:3,background:ev.gameColor||"#666",flexShrink:0,position:"relative",overflow:"hidden"}}>
          {game?.icon&&<img src={game.icon} alt="" onError={e=>e.target.style.display="none"} style={{position:"absolute",inset:0,width:16,height:16,objectFit:"cover"}}/>}
        </div>
        <span style={{fontSize:10,flex:1,color:tc("업데이트"),fontWeight:700}}>
          🔄 {ev.version?ev.version+" ":""}업데이트 적용
        </span>
      </div>
    </div>);
  }
  // 픽업 이벤트는 캐릭터명만 표시 (전체 제목 대신)
  const displayTitle = (ev.type==="픽업" && ev.character) ? ev.character : ev.title;
  // 배너 이미지는 이벤트 시작일에만 표시
  const showImg = !cellDs || ev.date === cellDs;
  const ytid=getYtId(ev.youtubeUrl),thumb=ytid?`https://img.youtube.com/vi/${ytid}/mqdefault.jpg`:null;
  return(<div onClick={onClick} className={`ecard${className?" "+className:""}`} style={{border:`.5px solid ${tbr(ev.type)}44`,...(extraStyle||{})}}>
    {showImg&&thumb&&<div style={{position:"relative",height:68,overflow:"hidden",background:"#000"}}><img src={thumb} alt="" style={{width:"100%",height:68,objectFit:"cover",opacity:.9}} onError={e=>e.target.parentElement.style.display="none"}/><div style={{position:"absolute",inset:0,background:"linear-gradient(to bottom,transparent 50%,rgba(0,0,0,.6))"}}/><span style={{position:"absolute",top:4,right:4,background:"rgba(0,0,0,.7)",borderRadius:4,padding:"2px 4px",display:"inline-flex"}}><svg width="11" height="11" viewBox="0 0 24 24" fill="#FF0000"><path d="M8 5v14l11-7z"/></svg></span></div>}
    {showImg&&!thumb&&ev.characterImg&&<div style={{maxHeight:80,overflow:"hidden",display:"flex",justifyContent:"center",background:ev.gameColor+"18"}}><img src={ev.characterImg} alt="" onError={e=>e.target.parentElement.style.display="none"} style={{width:"100%",objectFit:"cover",objectPosition:"top"}}/></div>}
    {showImg&&!thumb&&!ev.characterImg&&game?.icon&&null}
    <div style={{padding:"4px 6px 5px",display:"flex",alignItems:"center",gap:4,background:tb(ev.type)}}>
      <div style={{width:16,height:16,borderRadius:3,background:ev.gameColor||"#666",flexShrink:0,position:"relative",overflow:"hidden"}}>
        {game?.icon&&<img src={game.icon} alt="" onError={e=>e.target.style.display="none"} style={{position:"absolute",inset:0,width:16,height:16,objectFit:"cover"}}/>}
      </div>
      <span style={{fontSize:10,flex:1,overflow:"hidden",textOverflow:"ellipsis",color:tc(ev.type),fontWeight:500,lineHeight:1.3}}>{displayTitle}{ev.type==="픽업"&&ev.character&&ev.version?` (${ev.version})`:""}</span>
      {(!showImg||(!thumb&&!ev.characterImg))&&<span style={{fontSize:8,padding:"1px 4px",borderRadius:8,background:"rgba(0,0,0,.18)",color:tc(ev.type),flexShrink:0}}>{ev.type}</span>}
    </div>
  </div>);
}

function GameDetailModal({game,fetchSt,debugLog,evCount,onRefetch,onSave,onDelete,onClose}){
  const [name,setName]=useState(game.name);
  const [url,setUrl]=useState(game.url||"");
  const [qs,setQs]=useState(game.qs||"");
  const st=fetchSt[game.id],isFetching=!!(st&&st.state==="fetching");
  return(<div className="overlay" onClick={onClose}><div className="modal" onClick={e=>e.stopPropagation()}>
    <div style={{display:"flex",alignItems:"center",gap:8,marginBottom:14}}>
      {game.icon?<img src={game.icon} alt="" onError={e=>e.target.style.display="none"} style={{width:30,height:30,borderRadius:6,objectFit:"cover",border:`2px solid ${game.color}`}}/>:<div style={{width:30,height:30,borderRadius:6,background:game.color,display:"flex",alignItems:"center",justifyContent:"center",fontSize:14,fontWeight:700,color:"#fff"}}>{(game.name[0]||"?").toUpperCase()}</div>}
      <h3 style={{fontSize:14,color:"var(--tp)",flex:1,fontWeight:600}}>{game.name}</h3>
      <button className="ib" onClick={onClose} style={{fontSize:16}}>×</button>
    </div>
    <div style={{display:"flex",gap:6,marginBottom:12}}>
      <div style={{flex:1,padding:8,borderRadius:6,background:"var(--bh)",textAlign:"center"}}><div style={{fontSize:22,fontWeight:700,color:"var(--tp)"}}>{evCount}</div><div style={{fontSize:10,color:"var(--tm)"}}>수집된 일정</div></div>
      <div style={{flex:2,padding:"8px 10px",borderRadius:6,background:"var(--bh)"}}><div style={{fontSize:10,color:"var(--tm)",marginBottom:2}}>마지막 수집</div><div style={{fontSize:11,color:"var(--tp)"}}>{game.fetched||"아직 없음"}</div></div>
    </div>
    {st&&<div style={{padding:"7px 10px",borderRadius:6,marginBottom:10,fontSize:11,background:stColor(st.state)+"18",color:stColor(st.state)}}>{st.msg}</div>}
    <button onClick={onRefetch} disabled={isFetching} style={{width:"100%",padding:8,fontSize:12,cursor:isFetching?"not-allowed":"pointer",display:"flex",alignItems:"center",justifyContent:"center",gap:6,marginBottom:12,fontFamily:"inherit",opacity:isFetching?.6:1,borderRadius:6,border:".5px solid var(--br)",background:"var(--bh)",color:"var(--tp)"}}>{isFetching?"수집 중...":"재수집"}</button>
    {(game.ytChannel||game.twitter||game.officialUrl)&&<div style={{display:"flex",gap:6,marginBottom:12,flexWrap:"wrap"}}>
      {game.ytChannel&&<a href={`https://www.youtube.com/channel/${game.ytChannel}`} target="_blank" rel="noreferrer"
        style={{display:"flex",alignItems:"center",gap:4,padding:"5px 10px",borderRadius:6,background:"rgba(255,0,0,.1)",color:"#ff4040",border:".5px solid rgba(255,0,0,.2)",fontSize:11,textDecoration:"none"}}>
        ▶ YouTube
      </a>}
      {game.twitter&&<a href={game.twitter} target="_blank" rel="noreferrer"
        style={{display:"flex",alignItems:"center",gap:4,padding:"5px 10px",borderRadius:6,background:"rgba(29,161,242,.1)",color:"#1da1f2",border:".5px solid rgba(29,161,242,.2)",fontSize:11,textDecoration:"none"}}>
        𝕏 Twitter
      </a>}
      {game.officialUrl&&<a href={"https://"+game.officialUrl} target="_blank" rel="noreferrer"
        style={{display:"flex",alignItems:"center",gap:4,padding:"5px 10px",borderRadius:6,background:"rgba(55,138,221,.1)",color:"#378ADD",border:".5px solid rgba(55,138,221,.2)",fontSize:11,textDecoration:"none"}}>
        🌐 공식사이트
      </a>}
    </div>}
    <div style={{display:"flex",flexDirection:"column",gap:10}}>
      <div><label style={{fontSize:11,color:"var(--ts)",display:"block",marginBottom:5,fontWeight:500}}>게임 이름</label><input value={name} onChange={e=>setName(e.target.value)} className="inp"/></div>
      <div><label style={{fontSize:11,color:"var(--ts)",display:"block",marginBottom:5,fontWeight:500}}>API URL</label><input value={url} onChange={e=>setUrl(e.target.value)} className="inp" style={{fontSize:10}}/></div>
      <div><label style={{fontSize:11,color:"var(--ts)",display:"block",marginBottom:5,fontWeight:500}}>Query String</label><input value={qs} onChange={e=>setQs(e.target.value)} className="inp" style={{fontSize:10}}/></div>
      {debugLog[game.id]&&<div><label style={{fontSize:11,color:"var(--ts)",display:"block",marginBottom:5,fontWeight:500}}>수집 로그</label><pre style={{fontSize:9,color:"var(--ts)",background:"var(--bi)",borderRadius:6,padding:"6px 8px",overflow:"auto",maxHeight:140,whiteSpace:"pre-wrap",wordBreak:"break-all",lineHeight:1.5}}>{debugLog[game.id]}</pre></div>}
    </div>
    <div style={{display:"flex",gap:6,marginTop:16}}>
      <button onClick={onDelete} style={{padding:"8px 12px",fontSize:11,cursor:"pointer",fontFamily:"inherit",color:"#f17172",background:"rgba(241,113,114,.1)",border:".5px solid rgba(241,113,114,.3)",borderRadius:6}}>삭제</button>
      <div style={{flex:1}}/>
      <button onClick={onClose} style={{padding:"8px 14px",fontSize:12,cursor:"pointer",fontFamily:"inherit",borderRadius:6,border:".5px solid var(--br)",background:"var(--bh)",color:"var(--ts)"}}>취소</button>
      <button onClick={()=>onSave({name,url,qs})} style={{padding:"8px 14px",fontSize:12,cursor:"pointer",fontFamily:"inherit",background:"#378ADD",color:"#fff",border:"none",borderRadius:6}}>저장</button>
    </div>
  </div></div>);
}

function SettingsPanel({token,setToken,dbId,setDbId,broadcastDbId,setBroadcastDbId,noteDbId,setNoteDbId,onSave,onBulkSync,onFetchSchema,onFetchBroadcast,onFetchNotes,onSearchDbs,onSetup}){
  const [show,setShow]=useState(false);
  return(<div style={{flex:1,overflow:"auto",padding:18}}>
    <p style={{marginBottom:14,fontSize:14,fontWeight:600,color:"var(--tp)"}}>설정</p>
    <div style={{maxWidth:460,display:"flex",flexDirection:"column",gap:12}}>
      <div style={{background:"var(--bc)",border:".5px solid var(--br)",borderRadius:10,padding:14}}>
        <p style={{marginBottom:6,fontSize:13,fontWeight:500,color:"var(--tp)"}}>Notion 연동</p>
        <p style={{marginBottom:10,fontSize:11,color:"var(--ts)",lineHeight:1.6}}>
          1. <a href="https://www.notion.so/my-integrations" target="_blank" rel="noreferrer" style={{color:"#378ADD"}}>notion.so/my-integrations</a>에서 Internal Integration 생성<br/>
          2. Integration Token 복사 후 아래 입력<br/>
          3. 노션 캘린더 DB → ··· → 연결 → Integration 선택<br/>
          4. DB URL에서 ID 복사 (32자리 hex)
        </p>
        <label style={{fontSize:11,color:"var(--ts)",display:"block",marginBottom:4}}>Integration Token</label>
        <div style={{display:"flex",gap:6,marginBottom:10}}>
          <input type={show?"text":"password"} value={token} onChange={e=>setToken(e.target.value)} placeholder="ntn_..." className="inp" style={{flex:1}}/>
          <button className="ib" onClick={()=>setShow(s=>!s)} style={{padding:"6px 10px"}}>{show?"숨김":"표시"}</button>
        </div>
        <label style={{fontSize:11,color:"var(--ts)",display:"block",marginBottom:4}}>Database ID</label>
        <input value={dbId} onChange={e=>setDbId(e.target.value)} placeholder="32자리 hex (DB URL에서 복사)" className="inp" style={{marginBottom:10}}/>
        <label style={{fontSize:11,color:"var(--ts)",display:"block",marginBottom:4}}>방송 캘린더 DB ID <span style={{opacity:.6}}>(비워두면 위 DB와 동일)</span></label>
        <input value={broadcastDbId} onChange={e=>setBroadcastDbId(e.target.value)} placeholder="방송 일정 DB ID (선택)" className="inp" style={{marginBottom:8}}/>
        <label style={{fontSize:11,color:"var(--ts)",display:"block",marginBottom:4}}>노트/문서 목록 DB ID</label>
        <input value={noteDbId} onChange={e=>setNoteDbId(e.target.value)} placeholder="문서 목록 DB ID (전체 로그 → DB 목록 조회로 확인)" className="inp" style={{marginBottom:10}}/>
        <div style={{display:"flex",gap:6,flexWrap:"wrap"}}>
          <button onClick={onSave} style={{flex:1,minWidth:70,padding:"7px 0",fontSize:11,cursor:"pointer",fontFamily:"inherit",borderRadius:6,background:"#378ADD",color:"#fff",border:"none"}}>저장</button>
          <button onClick={onSetup} style={{flex:2,minWidth:120,padding:"7px 0",fontSize:11,cursor:"pointer",fontFamily:"inherit",borderRadius:6,background:"rgba(15,157,117,.15)",color:"#0F9D75",border:".5px solid rgba(15,157,117,.3)"}}>🚀 Notion 초기 설정 (DB 자동 생성)</button>
          <button onClick={onSearchDbs} style={{flex:1,minWidth:70,padding:"7px 0",fontSize:11,cursor:"pointer",fontFamily:"inherit",borderRadius:6,background:"rgba(55,138,221,.08)",color:"#378ADD",border:".5px solid rgba(55,138,221,.25)"}}>🗄 DB 목록 조회</button>
          <button onClick={onFetchSchema} style={{flex:1,minWidth:70,padding:"7px 0",fontSize:11,cursor:"pointer",fontFamily:"inherit",borderRadius:6,background:"rgba(55,138,221,.08)",color:"#378ADD",border:".5px solid rgba(55,138,221,.25)"}}>🔍 DB 속성 확인</button>
          <button onClick={onFetchBroadcast} style={{flex:1,minWidth:70,padding:"7px 0",fontSize:11,cursor:"pointer",fontFamily:"inherit",borderRadius:6,background:"rgba(255,180,50,.1)",color:"#FFB432",border:".5px solid rgba(255,180,50,.25)"}}>📅 방송일정</button>
          <button onClick={onFetchNotes} style={{flex:1,minWidth:70,padding:"7px 0",fontSize:11,cursor:"pointer",fontFamily:"inherit",borderRadius:6,background:"rgba(120,80,255,.1)",color:"#9B60FF",border:".5px solid rgba(120,80,255,.25)"}}>📝 노트 불러오기</button>
          <button onClick={onBulkSync} style={{flex:1,minWidth:70,padding:"7px 0",fontSize:11,cursor:"pointer",fontFamily:"inherit",borderRadius:6,background:"rgba(15,157,117,.12)",color:"#0F9D75",border:".5px solid rgba(15,157,117,.25)"}}>📤 노션 일괄 등록</button>
        </div>
      </div>
    </div>
  </div>);
}

ReactDOM.createRoot(document.getElementById("root")).render(<App/>);
</script>
</body>
</html>
