function extractPickupChar(title, content) {
  const cl = s => (s||'').replace(/<[^>]+>/g,' ').replace(/\s+/g,' ').trim();
  const t = cl(title);
  const c = cl(content||'').slice(0,4000);

  function tryMatch(src) {
    var m;
    // 1. ★/☆5성: ★5 캐릭터 「이름(경로)」
    m = src.match(/[★☆][45]\s*(?:캐릭터|공명자|요원)\s*「([^」]+)」/);
    if (m) {
      var name = m[1].replace(/\([^)]*\)/g,'').trim();
      if (name.length >= 2 && name.length <= 16) return name;
    }
    // 2. 원신: 「이름」 이벤트/기원/소원
    m = src.match(/「([^」]{1,12})」\s*(?:이벤트|한정|기원|소원)/);
    if (m && !/번째|달|버전|패스/.test(m[1])) return m[1].trim();
    // 3. 붕3rd S급 캐릭터 이름 (직책어/속성명 제외)
    m = src.match(/[Ss]급\s*(?:발키리|캐릭터)?\s+([가-힣]{2,6})\s+/);
    var BAD3 = /버전|달|이벤트|배틀|에이전트|요원|캐릭터|공명자|파티|지원|업데이트|강화|일정|캐스/;
    if (m && !BAD3.test(m[1])) return m[1].trim();
    // 4. ZZZ S/A급 요원 「이름」또는 [이름(속성)]
    m = src.match(/[SsAa]급\s*(?:요원|에이전트)?\s*「([가-힣a-zA-Z]{2,10})」/);
    if (m) return m[1].trim();
    m = src.match(/[SsAa]급\s*(?:요원|에이전트)?\s*\[([가-힣a-zA-Z]{2,10})/);
    if (m) return m[1].trim();
    // 별도 패턴: [이름(속성·원소)]
    m = src.match(/\[([가-힣a-zA-Z]{2,10})(?:[·•(]|$)/);
    if (m && !/버전|달|이벤트/.test(m[1])) return m[1].trim();
    // 5-1. 명조: "공명자 화면 | 루시" 형식 → | 뒤 캐릭터명
    m = src.match(/공명자[^|]*\|\s*([가-힣a-zA-Z·]{2,10})/);
    if (m) return m[1].trim();
    // 5-2. 명조: "음률 시뮬레이션 | 카르티시아" 등 파이프 뒤 이름
    m = src.match(/(?:공명자|기간\s*한정|모집|픽업)[^|]*\|\s*([가-힣a-zA-Z·]{2,10})/);
    if (m) return m[1].trim();
    // 5-3. 명조/기타 「이름」 픽업/소환/모집/공명자
    m = src.match(/「([가-힣a-zA-Z]{2,8})」\s*(?:픽업|소환|모집|공명자)/);
    if (m) return m[1].trim();
    return null;
  }

  var r = tryMatch(t) || tryMatch(c);
  if (r) return r;
  // Fallback: 짧은 「이름」
  var bad = /번째|달|버전|패스|치유|공허|화염|망각|깃|잿빛|블레/;
  var metas = [];
  var rm; var re = /「([^」]{1,8})」/g;
  while ((rm = re.exec(t)) !== null) {
    if (!bad.test(rm[1]) && rm[1].length >= 2) metas.push(rm[1]);
  }
  return metas[0] || null;
}

function detectType(title, tag) {
  // 비표준 공백(NBSP, ZWSP 등) → 일반 공백으로 정규화
  const t=(title||"").toLowerCase().replace(/[\u00A0\u200B\u3000\uFEFF]+/g," ").replace(/\s+/g," ").trim();
  const g=(tag||"").toLowerCase();

  // ── 웹/앱/상점 업데이트는 게임 버전 업데이트가 아님 ──────────────────
  if(t.includes("웹 이벤트")&&(t.includes("업데이트")||t.includes("갱신"))) return null;
  if(t.includes("hoyolab")&&t.includes("업데이트")) return null;
  if(t.includes("웹 페이지")&&t.includes("업데이트")) return null;     // 공략 가이드 웹페이지
  if(t.includes("상점")&&t.includes("업데이트")&&!t.includes("점검")) return "이벤트"; // 상점 업데이트 → 이벤트
  if((t.includes("웹")&&t.includes("업데이트"))&&!t.includes("버전")&&!t.includes("점검")) return null;
  // ── 업데이트: 게임 버전 업데이트만 ─────────────────────────────────
  if(t.includes("버전 업데이트")||t.includes("version update")) return "업데이트";
  if(/v?\d+\.\d+.*업데이트|업데이트.*v?\d+\.\d+/.test(t)) return "업데이트";
  if(t.includes("콘텐츠 일람")) return "업데이트";
  if(t.includes("점검 공지")||(t.includes("점검")&&t.includes("버전"))) return "업데이트";

  // ── 픽업: SKIP 전에 먼저 체크 (배너 공지가 SKIP에 걸리지 않도록) ──
  // 원신 (Genshin Impact)
  if(t.includes("이벤트 기원")||t.includes("이벤트기원")) return "픽업";
  if(t.includes("이벤트 소원")||t.includes("한정 소원")) return "픽업"; // 원신 한국어 표기
  if(t.includes("신의 주조")) return "픽업";           // 원신 무기 배너
  if(t.includes("묶음 기원")||t.includes("묶음소원")) return "픽업";    // 원신 번들
  if(t.includes("재이 기원")||t.includes("만지우")) return "픽업";      // 원신 클로니클
  if(t.includes("상반기 이벤트")||t.includes("하반기 이벤트")) return "픽업"; // 원신 상/하반기
  // 붕괴: 스타레일 (HSR)
  if(t.includes("이벤트 워프")) return "픽업";
  if(t.includes("departure warp")||t.includes("event warp")) return "픽업";
  if(t.includes("phase i")||t.includes("phase ii")||t.includes("phase 1")||t.includes("phase 2")) return "픽업";
  // ZZZ
  if(t.includes("기간 한정 채널")) return "픽업";      // 기간 한정 채널(상반기/W-엔진)
  if(t.includes("w-엔진")||t.includes("기간한정채널")) return "픽업";
  // 붕괴3rd
  if(t.includes("기간 한정 소환")||t.includes("기간한정소환")) return "픽업";
  if(t.includes("기간 한정 공급")||t.includes("특별 공급")) return "픽업";
  if(t.includes("팽창 공명")||t.includes("초공명 전개")) return "픽업";
  if(t.includes("신규 협력 캐릭터")&&t.includes("등장")) return "픽업";
  if((t.includes("s급 캐릭터")||t.includes("a급 캐릭터"))&&(t.includes("등장")||t.includes("예고")||t.includes("출시"))) return "픽업";  // 붕3rd
  if(t.includes("신규 s급")&&(t.includes("등장")||t.includes("추가")||t.includes("예고"))) return "픽업";
  if(t.includes("s급")&&t.includes("등장")&&(t.includes("신규")||t.includes("캐릭터")||t.includes("제레")||t.includes("발키리"))) return "픽업"; // 넓은 패턴
  if((t.includes("발키리")||t.includes("valkyrie"))&&(t.includes("한정")||t.includes("limited"))) return "픽업";
  // 명조 (WuWa)
  if(t.includes("기간 한정 모집")||t.includes("기간한정모집")) return "픽업";
  if(t.includes("공명자")&&(t.includes("한정")||t.includes("모집")||t.includes("소환"))) return "픽업";
  if(t.includes("resonator")&&(t.includes("limited")||t.includes("convene"))) return "픽업";
  if(t.includes("시험 소환")||t.includes("특별 소환")) return "픽업";   // 명조 기타 배너
  // 공통 영문
  if(t.includes("event wish")||t.includes("banner")||t.includes("convene")) return "픽업";
  if(t.includes("limited supply")||t.includes("rate-up")) return "픽업";
  if(g.includes("기원")||g.includes("소원")||g.includes("wish")||g.includes("warp")||g.includes("banner")) return "픽업";

  // ── SKIP ─────────────────────────────────────────────────────────────
  const SKIP=["월페이퍼","wallpaper","충전","결제 오류","환불","접속 불가","서버 오류",
    "아이쨩의 극비","극비 정보","tips","기능 최적화","steam 사전 테스트",
    "fan art","fanart","survey","설문","discord","| 파일","| 영상","달에서 ",
    "오류 복구","오류 설명","이벤트 설명","이벤트 소개",
    "임무 안내","임무 소개","스테이지 안내","스토리 안내","시즌 확장 안내",
    "즐기는 법","활용법","입문","운영 성명","테스트 버전","폼폼과","리두 펀드",
    "300%","3배 드랍",
  ];
  if(SKIP.some(s=>t.includes(s))) return null;

  // ── 특별 방송 ─────────────────────────────────────────────────────────
  if(t.includes("특별 프로그램")||t.includes("특별방송")||t.includes("생방송")) return "특별 방송";
  if(t.includes("미리보기 방송")||t.includes("special program")||t.includes("livestream")) return "특별 방송";

  // ── 영상(PV) ──────────────────────────────────────────────────────────
  if(/ pv$| pv |\(pv\)/.test(t)||t.endsWith("pv")||t.includes("트레일러")) return "영상";
  if(t.includes("trailer")||t.includes("teaser")||t.includes("cinematic mv")) return "영상";

  // ── 업데이트 추가 패턴 ────────────────────────────────────────────────
  if(t.includes("패치 노트")||t.includes("patch notes")) return "업데이트";
  if(g.includes("업데이트")||g.includes("update")) return "업데이트";

  return null;
}

/* ── Fetch JSON — local Python proxy only ────────────────────────────────── */
// HoYoverse has no CORS headers → direct browser calls always blocked.
// proxy.py at localhost:8080 fetches server-side → no CORS restriction.
// YouTube ID 추출 (정규식 미사용 - 백슬래시 인코딩 문제 회피)
function getYtId(url) {
  if(!url) return null;
  var patterns = ["watch?v=","watch/?v=","youtu.be/","embed/","shorts/","live/"];
  for(var i=0;i<patterns.length;i++){
    var idx=url.indexOf(patterns[i]);
    if(idx>=0){var id=url.slice(idx+patterns[i].length,idx+patterns[i].length+11).replace(/[^A-Za-z0-9_-]/g,"");if(id.length===11)return id;}
  }
  return null;
}

async function fetchJSON(url, logs) {
  const TIMEOUT = 12000; // 12초 타임아웃

  // localhost URL은 proxy 루프 방지 - 직접 접속
  if(url.startsWith("http://localhost")||url.startsWith("http://127.0.0.1")){
    const ctrl=new AbortController();
    const timer=setTimeout(()=>ctrl.abort(),TIMEOUT);
    try{
      const r=await fetch(url,{headers:{Accept:"application/json"},signal:ctrl.signal});
      clearTimeout(timer);
      if(r.ok){logs.push("[로컬 프록시] OK");return r.json();}
      logs.push("[로컬] HTTP "+r.status);
    }catch(e){
      clearTimeout(timer);
      if(e.name==="AbortError") logs.push("[로컬] 타임아웃");
      else logs.push("[로컬] 실패: "+e.message);
    }
    throw new Error("FETCH_FAILED");
  }

  // 1) Local Python proxy
  try {
    const ctrl = new AbortController();
    const timer = setTimeout(() => ctrl.abort(), TIMEOUT);
    const r = await fetch(`${API}/api/hoyo?url=` + encodeURIComponent(url),
      {headers:{Accept:"application/json"}, signal:ctrl.signal});
    clearTimeout(timer);
    if(r.ok){ logs.push("[로컬 프록시] OK"); return r.json(); }
    logs.push("[로컬 프록시] HTTP " + r.status);
  } catch(e){
    if(e.name==="AbortError") logs.push("[로컬 프록시] 타임아웃 (12s)");
    else logs.push("[로컬 프록시] 실패: " + e.message);
  }

  // 2) Direct fallback
  try {
    const ctrl2 = new AbortController();
    const timer2 = setTimeout(() => ctrl2.abort(), TIMEOUT);
    const r = await fetch(url, {headers:{Accept:"application/json"}, signal:ctrl2.signal});
    clearTimeout(timer2);
    if(r.ok){ logs.push("[직접] OK"); return r.json(); }
    logs.push("[직접] HTTP " + r.status);
  } catch(e){
    if(e.name==="AbortError") logs.push("[직접] 타임아웃");
    else logs.push("[직접] CORS 차단: " + e.message);
  }

  throw new Error(location.protocol === "file:" ? "FILE_PROTOCOL" : "FETCH_FAILED");
}

/* ── Parse HoYoverse announcements ─────────────────────────────────────────── */
function parseHoyo(data, past, future, logs) {
  // HoYoverse API 구조: data.list = [{type_label, list:[실제공지...]}] (2단계 중첩)
  // flatMap으로 카테고리를 펼쳐 실제 공지 아이템만 추출
  const cats=[...(data.list||[]),...(data.pic_list||[])];
  const list=cats.flatMap(cat=>Array.isArray(cat.list)?cat.list:Array.isArray(cat.pic_list)?cat.pic_list:[cat]);
  const seen=new Set(), out=[], skipped=[];
  list.forEach(ann=>{
    const title=ann.title||"";
    // start_time 필드명 다양하게 시도 (API 버전에 따라 다름)
    const dateRaw=ann.start_time||ann.startTime||ann.start_at||ann.begin_time||ann.start;
    const date=dateRaw?(typeof dateRaw==="number"?lDS(new Date(dateRaw>1e10?dateRaw:dateRaw*1000)):String(dateRaw).replace("T"," ").split(" ")[0]):null;
    if(!date){ if(title) skipped.push("날짜없음: "+title.slice(0,40)); return; }
    const dt=new Date(date);
    if(dt<past||dt>future){ skipped.push("범위밖("+date+"): "+title.slice(0,30)); return; }
    const tagRaw=ann.tag_label||ann.tagLabel||ann.tag||ann.type_label||"";
    const type=detectType(title,tagRaw);
    if(!type){ skipped.push("타입미분류: "+title.slice(0,40)+" [tag:"+tagRaw+"]"); return; }
    const key=type+"|"+date+"|"+title;
    if(seen.has(key)) return;
    seen.add(key);
    const vm=title.match(/(\d+\.\d+)/);
    const img=ann.banner||ann.img||ann.image||ann.banner_img||null;
    out.push({title,date,type,version:vm?vm[1]:null,character:null,characterImg:img,detail:null,youtubeUrl:null});
  });
  // 디버그: 필터링된 이유 + 실제 필드 구조 출력
  if(logs){
    if(skipped.length>0) logs.push("── 필터됨 "+skipped.length+"건 ──");
    skipped.slice(0,8).forEach(s=>logs.push("  ✗ "+s));
    if(out.length===0&&list.length>0){
      // 첫 번째 아이템의 모든 키 출력 (필드명 파악용)
      const first=list[0];
      logs.push("── 첫 번째 아이템 키 ──");
      logs.push("  keys: "+Object.keys(first).join(", "));
      logs.push("── 값 샘플 ──");
      Object.entries(first).slice(0,12).forEach(([k,v])=>{
        const val=typeof v==="object"?JSON.stringify(v).slice(0,60):String(v).slice(0,60);
        logs.push("  "+k+": "+val);
      });
    }
  }
  return out;
}

/* ── Main game fetch (returns {evs,logs} or throws) ───────────────────────── */
async function fetchGame(game, past, future, onApplyDate) {
  const logs=["["+game.name+"] "+game.url];
  let evs=[];
  let json=null;
  // 주 URL 시도 후 실패하면 fallbackUrl 시도
  try {
    json = await fetchJSON(game.url+"?"+game.qs, logs);
  } catch(e) {
    if(game.fallbackUrl){
      logs.push("[폴백 URL 시도] "+game.fallbackUrl);
      json = await fetchJSON(game.fallbackUrl+"?"+game.qs, logs);
    } else throw e;
  }
  if(game.kind==="bbs"){
    // HoYoLAB 뉴스 피드 파서
    if(json.retcode!==0) throw new Error("retcode="+json.retcode);
    // 타입별 기본 표시 기간 (포스트 게시일로부터 N일)
    const TYPE_DAYS={"픽업":21,"업데이트":1,"특별 방송":1,"영상":7};
    const addDays=(dateStr,n)=>{const d=new Date(dateStr);d.setDate(d.getDate()+n);return lDS(d);};

    const parseBbsItems=(items)=>{
      const unmatched=[];
      items.forEach(item=>{
        const post=item.post||item;
        let title=(post.subject||post.title||"").trim();
        if(!title) return;
        // BBS "영상" 포스트는 캘린더에서 제외 (유튜브 RSS가 별도 처리)
        const rawType=detectType(title,"");
        if(rawType==="영상"){unmatched.push("[영상-스킵] "+title.slice(0,40));return;}
        // 날짜 추출: 본문에서 "점검 일시" 추출 시도 (사전 다운로드 != 업데이트 날짜)
        const ts_created=post.created_at||post.publish_time||post.updated_at;
        if(!ts_created) return;
        const baseDate = lDS(new Date(ts_created > 1e12 ? ts_created : ts_created * 1000));
        // 본문에서 실제 점검/업데이트 날짜 추출
        function extractMaintDate(rawContent) {
          if(!rawContent) return null;
          const txt = rawContent.replace(/<[^>]+>/g,' ').replace(/&[a-z]+;/g,' ');
          // 패턴: "점검 일시.*YYYY년 M월 D일" 또는 "업데이트 날짜.*M월 D일"
          const patterns = [
            /점검\s*일시[^0-9]*(\d{4})년\s*(\d{1,2})월\s*(\d{1,2})일/,
            /점검[^0-9]*(\d{4})년\s*(\d{1,2})월\s*(\d{1,2})일/,
            /업데이트\s*(?:일시|날짜|예정)[^0-9]*(\d{4})년\s*(\d{1,2})월\s*(\d{1,2})일/,
            /維護時間[^0-9]*(\d{4})\D*(\d{1,2})\D*(\d{1,2})/,
          ];
          for(const pat of patterns) {
            const m = txt.match(pat);
            if(m) {
              const y=m[1], mo=String(m[2]).padStart(2,'0'), d=String(m[3]).padStart(2,'0');
              return `${y}-${mo}-${d}`;
            }
          }
          // "M월 D일" 패턴 (연도 없음 → 올해)
          const m2 = txt.match(/점검\s*일시[^0-9]*(\d{1,2})월\s*(\d{1,2})일/);
          if(m2) {
            const now=new Date(), y=now.getFullYear();
            return `${y}-${String(m2[1]).padStart(2,'0')}-${String(m2[2]).padStart(2,'0')}`;
          }
          return null;
        }
        // BBS 목록 API는 본문이 잘려있을 수 있음 → 여러 필드 시도
        const content = post.content || post.structured_content || post.desc || post.summary || '';
        const maintDate = extractMaintDate(content);
        // ★ 캘린더 표시는 항상 게시일. 업데이트 적용일은 applyDate로 별도 보관
        const date = baseDate;
        let applyDate = (maintDate && maintDate >= baseDate) ? maintDate : null;
        const farPast=new Date();farPast.setMonth(farPast.getMonth()-6);
        if(new Date(date)<farPast||new Date(date)>future) return;
        const type=rawType;
        if(!type){unmatched.push(title.slice(0,45));return;}
        // 타입별 기본 종료일 자동 부여 (달력에 기간 동안 표시됨)
        const days=TYPE_DAYS[type]??14;
        const endDate=addDays(date,days);
        const img=item.image_list?.[0]?.url||post.cover||null;
        const vid=item.video?.link_url||item.video?.play_url||"";
        const ytId=vid?getYtId(vid):null;
        const vm=title.match(/(\d+\.\d+)/);
        // 원신 「N번째 달」 → 버전명 변환 + 제목 정제
        const KR_ORD={'첫':1,'두':2,'세':3,'네':4,'다섯':5,'여섯':6,'일곱':7,'여덟':8,'아홉':9,'열':10};
        const GENSHIN_VER_BASE=6;
        // 「N번째 달」 또는 그냥 "N번째 달" (따옴표 없는 케이스) 모두 인식
        const vmKrOrd=title.match(/「?([가-힣]+)\s*번째\s*달」?/);
        // vmNamed는 버전으로 사용하지 않음 (캐릭터 타이틀이 version으로 들어가는 문제 방지)
        let version=null;
        if(vm) version=vm[1];
        else if(vmKrOrd){ const n=KR_ORD[vmKrOrd[1]]; version=n?`${GENSHIN_VER_BASE}.${n}`:vmKrOrd[1]; }
        // 「N번째 달」 버전 헤더를 제목에서 제거
        if(vmKrOrd) title=title
          .replace(/「[가-힣]+\s*번째\s*달」\s*(달\s*)?(버전)?\s*/g,"")
          .replace(/[가-힣]+\s*번째\s*달\s*(달\s*)?(버전)?\s*/g,"")
          .trim();
        // 너무 긴 제목 줄임 (40자 초과 시)
        if(title.length>40) title=title.slice(0,38)+"…";
        const postId=post.post_id||post.id||"";
        const detailUrl=postId?`https://www.hoyolab.com/article/${postId}`:(post.link_url||null);
        // 픽업일 때 캐릭터명 추출 (본문 포함)
        const postContent = post.content || post.structured_content || "";
        const character = (type==="픽업") ? extractPickupChar(title, postContent) : null;
        if(type==="업데이트") logs.push(`[UP] ${title.slice(0,20)} 게시일=${baseDate} 점검일=${maintDate||"본문조회필요"}`);
        evs.push({title,date,endDate:date,type,version,character,characterImg:img,detail:detailUrl,youtubeUrl:ytId?"https://youtu.be/"+ytId:null,postId:String(post.post_id||post.postId||""),gids:game.gids||"2",applyDate,needMaintDate:(type==="업데이트"&&!applyDate)});
      });
      return unmatched;
    };
    const items=(json.data?.list||[]);
    logs.push("── BBS 뉴스: "+items.length+"개");
    const um1=parseBbsItems(items);
    if(um1.length) logs.push("타입미분류("+um1.length+"): "+um1.slice(0,5).join(" / "));
    if(game.extraUrl){
      try{
        const json2=await fetchJSON(game.extraUrl+"?"+game.extraQs, logs);
        if(json2.retcode===0){
          const um2=parseBbsItems(json2.data?.list||[]);
          if(um2.length) logs.push("타입미분류(공지): "+um2.slice(0,5).join(" / "));
        }
      }catch(e2){logs.push("extraUrl 실패: "+e2.message);}
    }
  } else if(game.kind==="hoyo"){
    if(json.retcode!==0) throw new Error("retcode="+json.retcode);
    evs = parseHoyo(json.data||{}, past, future, logs);
  } else if(game.kind==="wuwa"){
    // 명조: Kuro CDN API → proxy.py /api/wuwa → [{title,date,type,version,img,url}] 배열
    const list=Array.isArray(json)?json:(json.list||json.data?.list||[]);
    logs.push("── 명조 이벤트: "+list.length+"개");
    list.forEach(item=>{
      const title=(item.title||item.articleTitle||"").trim();
      const date=(item.date||item.showTime||item.publishTime||"").slice(0,10);
      if(!title||!date||new Date(date)<past||new Date(date)>future) return;
      const type=item.type||detectType(title,"");
      if(!type) return;
      const ver=item.version||null;
      const img=item.img||item.articleImg||item.cover||null;
      const url=item.url||item.link||item.articleUrl||null;
      evs.push({
        title, date, type,
        version: ver,
        character: null,
        characterImg: img,
        detail: url,
        youtubeUrl: null
      });
    });
    logs.push("── 명조 파싱 완료: "+evs.length+"개");
  } else {
    // 명조(wuwa): proxy가 이미 {title,date,type,version,img,url}로 가공해서 전달
    const list=Array.isArray(json)?json:(json.data?.list||json.data?.noticeList||json.noticeList||json.list||[]);
    list.forEach(item=>{
      const title=item.title||item.content||item.noticeName||item.name||"";
      let date=item.date||null;
      if(!date){
        const ts=item.startTime||item.publishTime||item.createTime||item.time;
        if(ts){
          if(typeof ts==="number") date=lDS(new Date(ts>1e10?ts:ts*1000));
          else date=String(ts).split(/[ T]/)[0];
        }
      }
      if(!date||!/^\d{4}-\d{2}-\d{2}$/.test(date)) return;
      if(new Date(date)<past||new Date(date)>future) return;
      // proxy가 type을 줬으면 사용, 없으면 자체 감지
      const type=item.type||detectType(title,item.tagName||item.typeName||"");
      if(!type) return;
      const character=(type==="픽업")?extractPickupChar(title,""):null;
      evs.push({title,date,endDate:date,type,version:item.version||null,character,characterImg:item.img||item.coverUrl||item.imgUrl||null,detail:item.url||null,youtubeUrl:null});
    });
  }
  // ── YouTube RSS 수집 (ytChannel 설정된 게임만) ──────────────────────────
  if(game.ytChannel){
    try{
      const ctrl=new AbortController();
      const timer=setTimeout(()=>ctrl.abort(),12000);
      const proxyUrl=`${API}/api/yt?type=rss&channel=`+encodeURIComponent(game.ytChannel);
      const r=await fetch(proxyUrl,{signal:ctrl.signal});
      clearTimeout(timer);
      if(r.ok){
        const ytItems=await r.json();
        logs.push("── YouTube RSS: "+ytItems.length+"개 영상");
        ytItems.slice(0,15).forEach(item=>{
          const title=item.title||"";
          const date=item.date||"";
          if(!date) return;
          const type=detectType(title,"");
          // 유튜브 타입 분류: 특방/PV 위주, 없으면 "특별 방송"으로
          const tl=title.toLowerCase();
          // detectType으로 먼저, 안되면 방송/영상 패턴
          let evType=type;
          if(!evType){
            // 특별 방송 키워드
            if(tl.includes("특별 프로그램")||tl.includes("특별방송")||tl.includes("생방송")||
               tl.includes("미리보기 방송")||tl.includes("livestream")||tl.includes("live stream")||
               tl.includes("special program")||tl.includes("preview program")||
               (tl.includes("미리보기")&&(tl.includes("버전")||tl.includes("v.")))||
               tl.includes("방송 미리보기")||/버전.{0,10}프리뷰/.test(tl))
              evType="특별 방송";
            // 영상(PV) 키워드
            else if(tl.includes(" pv")||tl.endsWith("pv")||tl.includes("trailer")||
                    tl.includes("teaser")||tl.includes("예고편")||tl.includes("트레일러")||
                    tl.includes("character video")||tl.includes("캐릭터 pv")||
                    tl.includes("mv")||tl.includes("opening")||tl.includes("cinematic")||
                    / pv[^a-z]/.test(tl))
              evType="영상";
            // 픽업 키워드
            else if(tl.includes("이벤트 워프")||tl.includes("이벤트 기원")||tl.includes("event warp")||
                    tl.includes("warp")||tl.includes("phase i")||tl.includes("phase ii")||
                    tl.includes("phase 1")||tl.includes("phase 2")||tl.includes("banner")||
                    tl.includes("convene")||tl.includes("기간 한정 채널"))
              evType="픽업";
            // 업데이트 키워드
            else if(tl.includes("버전 업데이트")||tl.includes("version update")||
                    tl.includes("update")||tl.includes("업데이트")||tl.includes("콘텐츠 일람")||
                    tl.includes("patch")||tl.includes("version"))
              evType="업데이트";
            // 공식 채널 영상 - 위 어디도 해당 안되면 영상으로 분류 (공식 채널이므로 모두 포함)
            else
              evType="영상";
          }
          // 유튜브 영상은 타입 있으면 무조건 포함 (공식 채널)
          const ytVm=title.match(/(\d+\.\d+)/);
          const ytVer=ytVm?ytVm[1]:null;
          evs.push({title:item.isShort?'[Shorts] '+title:title,date,endDate:date,type:evType,version:ytVer,character:null,characterImg:item.thumb||null,detail:null,youtubeUrl:item.url||null,isShort:!!item.isShort});
        });
      }else{logs.push("YouTube RSS: HTTP "+r.status);}
    }catch(e){logs.push("YouTube RSS 실패: "+e.message);}
  }
  // 업데이트 점검일 보정: fetchGame을 막지 않도록 백그라운드 처리 (await 안 함)
  const needFix=evs.filter(e=>e.type==="업데이트"&&!e.applyDate&&e.postId);
  logs.push(`[점검일보정] 대상 ${needFix.length}개(백그라운드)`);
  if(needFix.length&&IS_LOCAL){
    const toFix=needFix.slice(0,5); // 최신 5개만
    // await 하지 않음 → fetchGame 즉시 반환, 보정은 백그라운드에서
    (async()=>{
    await Promise.all(toFix.map(async ev=>{
      try{
        const ctrl=new AbortController();
        const tid=setTimeout(()=>ctrl.abort(),5000); // 5초 타임아웃
        const r=await fetch(`${API}/api/hoyo-post?post_id=${ev.postId}&gids=${ev.gids}`,{signal:ctrl.signal});
        clearTimeout(tid);
        if(!r.ok) return;
        const d=await r.json();
        const post=d?.data?.post?.post||{};
        const txt=(post.content||"").replace(/<[^>]+>/g," ").replace(/&[a-z]+;/g," ");
        // 업데이트 날짜 추출: 사전 다운로드 종료일 > 점검 일시 순
        let nd=null, method=null;
        // 1. 사전 다운로드 기간 ... ~ YYYY.MM.DD (종료일 = 업데이트일) ★최우선
        let m=txt.match(/사전\s*다운로드\s*기간[^~]*~\s*(\d{4})[.\-\/년]\s*(\d{1,2})[.\-\/월]\s*(\d{1,2})/);
        if(m){nd=`${m[1]}-${String(m[2]).padStart(2,"0")}-${String(m[3]).padStart(2,"0")}`;method="사전DL종료";}
        // 2. 점검 일시 YYYY년 M월 D일
        if(!nd){m=txt.match(/점검\s*일시[^0-9]*(\d{4})년?\s*(\d{1,2})월\s*(\d{1,2})일/);
          if(m){nd=`${m[1]}-${String(m[2]).padStart(2,"0")}-${String(m[3]).padStart(2,"0")}`;method="점검일시";}}
        // 3. 점검 일시 M월 D일 (연도 생략 → 게시연도)
        if(!nd){m=txt.match(/점검\s*일시[^0-9]*(\d{1,2})월\s*(\d{1,2})일/);
          if(m){nd=`${ev.date.slice(0,4)}-${String(m[1]).padStart(2,"0")}-${String(m[2]).padStart(2,"0")}`;method="점검일시2";}}
        if(nd&&nd>=ev.date){
          ev.applyDate=nd;
          // 보정 결과를 콜백으로 전달 (App에서 events 업데이트)
          if(onApplyDate) onApplyDate({gameId:ev.gameId,title:ev.title,date:ev.date,applyDate:nd});
        }
      }catch(e){}
    }));
    })(); // 백그라운드 IIFE 즉시 실행
  }
  logs.push("완료: "+evs.length+"개");
  return {evs, logs};
}

    const res=[];

    for(let d=1;d<=ld;d++) res.push({day:d,yr,mo,cur:true,ds:`${yr}-${String(mo+1).padStart(2,"0")}-${String(d).padStart(2,"0")}`});
    let nd=1; while(res.length%7!==0){res.push({day:nd,yr:nyr,mo:nmo,cur:false,ds:`${nyr}-${String(nmo+1).padStart(2,"0")}-${String(nd).padStart(2,"0")}`});nd++;}

        // URL/qs/kind/icon은 항상 최신 HOYO_CFGS 값으로 덮어씀 (구버전 URL 자동 수정)
        ig=saved.map(g=>{

          return def?{...g,url:def.url,qs:def.qs,kind:def.kind,icon:def.icon||g.icon||null,gids:def.gids,fallbackUrl:def.fallbackUrl,extraUrl:def.extraUrl,extraQs:def.extraQs,ytChannel:def.ytChannel,twitter:def.twitter||null,officialUrl:def.officialUrl||null}:g;
        });
        // HOYO_CFGS에 새로 추가된 게임은 자동으로 목록에 추가
        HOYO_CFGS.forEach(def=>{
          if(!ig.find(g=>g.id===def.id)) ig.push({...def,on:true,fetched:null,fetchedAt:0});
        });
      }catch{ig=HOYO_CFGS.map(c=>({...c,on:true,fetched:null,fetchedAt:0}));}
      try{const r=await store.get("v146_e");setEvents(JSON.parse(r.value));}catch{}
      try{const r=await store.get("v146_t");if(r?.value)setNotionTok(r.value);}catch{}
      try{const r=await store.get("v45_dbid");if(r?.value)setNotionDbId(r.value);}catch{}

      try{const r=await store.get("cal_filters");if(r?.value){const f=JSON.parse(r.value);if(f.showNotes!=null)setShowNotesInCal(f.showNotes);if(f.showBcast!=null)setShowBcastInCal(f.showBcast);}}catch{}
      setGames(ig);
      setReady(true);
      if(location.protocol!=="file:"){
        const stale=ig.filter(g=>!g.fetchedAt||Date.now()-g.fetchedAt>CACHE_MS);
        for(let i=0;i<stale.length;i++){

          if(i<stale.length-1) await new Promise(r=>setTimeout(r,400));
        }
      }
    })();
  },[]);

  async function doFetch(game) {
    if(location.protocol==="file:"){setShowGuide(true);return;}
    setSt(game.id,"fetching","수집 중...");
    const past=new Date(now);past.setMonth(past.getMonth()-6); // 6개월 전까지 포함 (진행중 이벤트 포착)
    const future=new Date(now);future.setMonth(future.getMonth()+3);
    try{
      const {evs,logs}=await fetchGame(game,past,future,(u)=>{
        // 백그라운드 점검일 보정 완료 → events 즉시 업데이트
        setEvents(prev=>prev.map(pe=>(pe.gameId===u.gameId&&pe.title===u.title&&pe.date===u.date)?{...pe,applyDate:u.applyDate}:pe));
      });
      setDebugLog(p=>({...p,[game.id]:logs.join("\n")}));
      const mapped=evs.map(ev=>({...ev,id:game.id+"_"+ev.date+"_"+Math.random().toString(36).slice(2,6),gameId:game.id,gameName:game.name,gameColor:game.color,endDate:ev.endDate||null,synced:false}));
      setEvents(p=>[...p.filter(e=>e.gameId!==game.id),...mapped]);
      setGames(p=>p.map(g=>g.id===game.id?{...g,fetched:new Date().toLocaleString("ko-KR"),fetchedAt:Date.now()}:g));
      setSt(game.id,mapped.length===0?"warn":"done",mapped.length===0?"일정 없음":mapped.length+"개 수집 완료");
    }catch(err){
      setDebugLog(p=>({...p,[game.id]:"오류: "+err.message}));
      setSt(game.id,"error",err.message);
    }
  }

  const goMonth=dir=>{const nm=mo+dir,ny=nm<0?yr-1:nm>11?yr+1:yr,am=((nm%12)+12)%12;if(new Date(ny,am,1)<new Date(now.getFullYear(),now.getMonth()-1,1))return;setYr(ny);setMo(am);};

  // 단건 노션 동기화
  // silent=true 이면 alert 없이 에러를 throw로 전달 (일괄 등록용)
  async function syncNotion(ev, silent=false){
    if(!notionTok){if(!silent)alert("설정 → Notion Token을 입력해주세요.");return false;}
    if(!notionDbId){if(!silent)alert("설정 → Notion DB ID를 입력해주세요.");return false;}
    if(ev.type!=="업데이트"&&ev.type!=="특별 방송"){
      if(!silent)alert("업데이트·특별방송 이벤트만 노션에 등록할 수 있습니다.");return false;
    }
    setSyncing(m=>({...m,[ev.id]:"pending"}));
    try{
      const charName=ev.character||extractPickupChar(ev.title)||null;
      const props={
        "컨텐츠":{title:[{text:{content:ev.title||""}}]},          // title 필드명: 컨텐츠
        "날짜":{date:{start:ev.date,end:ev.endDate||null}},
        "컨텐츠 종류":{multi_select:ev.type?[{name:ev.type}]:[]},
      };
      // 버전: DB에서 rich_text 타입 → 항상 문자열로 전송
      if(ev.version) props["버전"]={rich_text:[{text:{content:String(ev.version)}}]};
      // 상세: DB에서 rich_text 타입 (url 아님)
      if(ev.detail) props["상세"]={rich_text:[{text:{content:ev.detail}}]};
      if(charName)  props["픽업 캐릭터"]={rich_text:[{text:{content:charName}}]};

      const r=await fetch(`${API}/api/notion?path=pages`,{
        method:"POST",
        headers:{"Authorization":"Bearer "+notionTok,"Content-Type":"application/json","Notion-Version":"2022-06-28"},
        body:JSON.stringify({parent:{database_id:notionDbId},properties:props})
      });
      if(r.ok){
        const u={...ev,synced:true};
        setEvents(p=>p.map(e=>e.id===ev.id?u:e));
        setSel(u);
        setSyncing(m=>({...m,[ev.id]:"ok"}));
        return true;
      }else{
        const je=await r.json().catch(()=>({}));
        // Notion API 에러를 한국어로 안내
        let msg=je?.message||"HTTP "+r.status;
        if(msg.includes("Could not find database"))
          msg="DB를 찾을 수 없습니다.\n① 설정에서 DB ID가 정확한지 확인\n② Notion DB → ··· → 연결 → '게임 캘린더' Integration을 추가해주세요.";
        if(msg.includes("unauthorized")||r.status===401)
          msg="인증 실패: Integration Token이 올바르지 않습니다.";
        if(msg.includes("not_found"))
          msg="DB를 찾을 수 없습니다. DB ID를 다시 확인해주세요.";
        throw new Error(msg);
      }
    }catch(err){
      setSyncing(m=>({...m,[ev.id]:"err"}));
      if(!silent) alert("동기화 실패:\n"+err.message);
      return false;
    }
  }

  // 일괄 동기화: silent 모드로 개별 alert 없이 처리, 완료 후 toast 1개로 결과 표시
  async function bulkSyncNotion(){
    if(!notionTok||!notionDbId){
      showToast("설정에서 Notion Token과 DB ID를 입력해주세요.");return;
    }
    const targets=events.filter(e=>!e.synced&&(e.type==="업데이트"||e.type==="특별 방송"));
    if(targets.length===0){showToast("등록할 이벤트가 없습니다 (이미 모두 등록됨).");return;}
    let ok=0,fail=0,failMsg="";
    for(const ev of targets){
      const success=await syncNotion(ev, true); // silent=true
      if(success) ok++;
      else{ fail++; if(!failMsg) failMsg=ev.title; }
      await new Promise(r=>setTimeout(r,350)); // Notion API rate limit
    }
    if(fail===0) showToast(`✓ ${ok}개 노션 등록 완료`);
    else showToast(`✓ ${ok}개 완료 / ✗ ${fail}개 실패${failMsg?" (첫 실패: "+failMsg.slice(0,20)+"…)":""}\n설정의 DB ID·Integration 연결을 확인해주세요.`);
  }

  // 노션 방송 일정 읽기
  async function fetchBroadcast(){
    const dbId=broadcastDbId||notionDbId;
    if(!dbId) return;
    // 로컬에서 토큰 없으면 읽을 게 없음 (공개 엔드포인트는 배포 전용)
    if(!notionTok&&IS_LOCAL) return;
    try{
      // 관리자(토큰): /api/notion. 팬(배포·토큰없음): 읽기 전용 /api/notion-public(GET)
      const r=notionTok
        ? await fetch(`${API}/api/notion?path=databases/${dbId}/query`,{
            method:"POST",
            headers:{"Authorization":"Bearer "+notionTok,"Content-Type":"application/json","Notion-Version":"2022-06-28"},
            body:JSON.stringify({sorts:[{property:"날짜",direction:"descending"}],page_size:100})
          })
        : await fetch(`${API}/api/notion-public?action=query&db=${dbId}`);
      if(!r.ok){
        const errText=await r.text().catch(()=>"");
        showToast("방송일정 읽기 실패 "+r.status+": "+errText.slice(0,60));
        console.error("방송일정 읽기 실패",r.status,errText);
        return;
      }
      const data=await r.json();
      const parsed=(data.results||[]).map(page=>{
        const props=page.properties||{};
        // 날짜 (time 포함 가능: "2026-06-05T20:00:00.000+09:00")
        const dateProp=props["날짜"]||props["일시"]||props["Date"]||{};
        const dateVal=dateProp.date?.start||"";
        if(!dateVal) return null;
        const dateStr=dateVal.slice(0,10);
        // 시간 파싱 → 없으면 기본값 오후 7시(19:00)
        let timeStr="오후 7:00";
        if(dateVal.includes("T")){
          const d=new Date(dateVal);
          let h=d.getHours(), m=d.getMinutes();
          const ap=h>=12?"오후":"오전";
          const h12=h>12?h-12:h===0?12:h;
          timeStr=`${ap} ${h12}${m>0?":"+String(m).padStart(2,"0"):""}시`;
        }
        // 게임명: "컨텐츠" title 필드
        const titleProp=props["컨텐츠"]||props["이름"]||props["제목"]||props["Name"]||{};
        const titleArr=titleProp.title||titleProp.rich_text||[];
        const rawTitle=titleArr.map(t=>t.plain_text||t.text?.content||"").join("").trim();
        // 모든 속성에서 게임명 후보 탐색 (relation 포함)
        // 게임명: "게임" relation 속성에서 직접 추출 (게임 목록 DB)
        let relPageId=null;
        const gameProp=props["게임"]||{};
        const gameRelIds=(gameProp.relation||[]).map(r=>r.id);
        if(gameRelIds.length>0){
          relPageId=gameRelIds[0];
        }
        // rawTitle이 유효하면 그대로, 아니면 relation 대기 상태로
        const genericTitles=["방송","특별 방송","업데이트","픽업","영상","방송일정"];
        const isGenericTitle=!rawTitle||genericTitles.includes(rawTitle);
        const title=(!isGenericTitle?rawTitle:(relPageId?"[관계:"+relPageId.slice(0,8)+"]":rawTitle))||"(방송)";
        // 컨텐츠 종류 태그에서 방송 여부 판단 (제목 기반 필터 X)
        const typeProp=props["컨텐츠 종류"]||{};
        const tags=(typeProp.multi_select||[]).map(t=>t.name);
        // 업데이트/픽업 태그 있으면 게임이벤트 - 방송일정에서 제외
        if(tags.some(t=>t==="업데이트"||t==="픽업")) return null;
        // 방송 관련 태그 없으면 제외
        if(!tags.some(t=>t.startsWith("방송")||t==="합방"||t==="특별 방송")) return null;
        const isCollab=tags.some(t=>t.includes("합방"));
        const evType=tags.includes("특별 방송")?"특별 방송":"방송";
        // 회차
        const epProp=props["컨텐츠 회차"]||props["회차"]||{};
        const episode=epProp.number||null;
        return{
          id:"bc_"+page.id,
          title,
          _rawTitle:rawTitle,      // 원본 제목 보존
          gameRelIds,              // relation IDs (resolve용)
          gameNames:[],            // resolve 후 채워짐
          date:dateStr,
          endDate:dateStr,
          timeStr,
          type:evType,
          tags,
          isCollab,
          episode,
          gameId:"bc_"+page.id,
          gameName:"",gameColor:"#FFB432",
          isBroadcast:true,
          notionPageId:page.id,
          notionUrl:`https://notion.so/${page.id.replace(/-/g,"")}`
        };
      }).filter(Boolean)
        .sort((a,b)=>a.date===b.date?(a.timeStr>b.timeStr?1:-1):0);
      // 게임 목록 relation 일괄 resolve
      const allRelIds=[...new Set(parsed.flatMap(e=>e.gameRelIds))];
      if(allRelIds.length>0){
        try{
          setDebugLog(p=>({...p,"방송":"[relation] resolve: "+allRelIds.length+"개"}));
          const rr=notionTok
            ? await fetch(`${API}/api/notion-pages?ids=${allRelIds.join(",")}`,{
                headers:{"Authorization":"Bearer "+notionTok,"Notion-Version":"2022-06-28"}
              })
            : await fetch(`${API}/api/notion-public?action=pages&ids=${allRelIds.join(",")}`);
          const raw=await rr.text();
          setDebugLog(p=>({...p,"방송":(p["방송"]||"")+"\n[relation] HTTP "+rr.status}));
          if(rr.ok){
            const titleMap=JSON.parse(raw);
            parsed.forEach(e=>{
              e.gameNames=e.gameRelIds.map(id=>titleMap[id]||"").filter(Boolean);
              // 제목이 generic이면 첫번째 게임명으로 대체
              const genericTitlesCheck=["방송","특별 방송","업데이트","픽업","영상","방송일정"];
              if((!e._rawTitle||genericTitlesCheck.includes(e._rawTitle))&&e.gameNames.length>0){
                e.title=e.gameNames[0];
              }
            });
          }
        }catch(err){
          setDebugLog(p=>({...p,"방송":(p["방송"]||"")+"\n[relation] 오류: "+err.message}));
        }
      }
      setBroadcastEvs([...parsed]);
      // 첫 번째 항목의 속성 → 전체 로그에 출력 (alert 없음)
      if(data.results?.length>0){
        const firstProps=data.results[0].properties;
        const propLines=Object.entries(firstProps).map(([k,v])=>{
          let val="";
          if(v.type==="title") val=v.title?.map(t=>t.plain_text).join("")||"(빈값)";
          else if(v.type==="rich_text") val=v.rich_text?.map(t=>t.plain_text).join("")||"(빈값)";
          else if(v.type==="multi_select") val=v.multi_select?.map(t=>t.name).join(",")||"(없음)";
          else if(v.type==="date") val=v.date?.start||"(없음)";
          else if(v.type==="number") val=String(v.number??"-");
          else if(v.type==="relation") val="[relation:"+v.relation?.map(r=>r.id.slice(0,8)).join(",")+"]";
          else if(v.type==="rollup") val="[rollup]";
          else if(v.type==="formula") val="[formula]";
          else val="("+v.type+")";
          return `[${v.type}] ${k}: ${val}`;
        });
        setDebugLog(p=>({...p,"방송":(p["방송"]||"")+"\n=== 첫번째 항목 속성 ===\n"+propLines.join("\n")+"\n==="}));
      }
      console.log("방송일정 raw",data.results?.length,"→ 필터후",parsed.length,"개");
      if(parsed.length===0&&(data.results||[]).length>0)
        showToast("방송일정: "+data.results.length+"개 중 방송 태그 있는 항목 0개 (태그 확인 필요)");
      else if(parsed.length>0){
        showToast("방송일정 "+parsed.length+"개 로드됨");
        // DB 목록 자동 조회 (노트 DB ID 찾기용)
        if(!noteDbId) searchNotionDbs();
      }
    }catch(e){console.warn("fetchBroadcast",e);}
  }

  // 방송 DB + 노트 DB 자동 로드

  // 노트 목록 읽기
  async function fetchNotes(){
    if(!noteDbId) return;
    if(!notionTok&&IS_LOCAL) return;
    setNoteLoading(true);
    try{
      const r=notionTok
        ? await fetch(`${API}/api/notion?path=databases/${noteDbId}/query`,{
            method:"POST",
            headers:{"Authorization":"Bearer "+notionTok,"Content-Type":"application/json","Notion-Version":"2022-06-28"},
            body:JSON.stringify({sorts:[{timestamp:"created_time",direction:"descending"}],page_size:100})
          })
        : await fetch(`${API}/api/notion-public?action=query&db=${noteDbId}`);
      if(!r.ok){showToast("노트 읽기 실패 "+r.status);setNoteLoading(false);return;}
      const data=await r.json();
      const notes=(data.results||[]).map(page=>{
        const props=page.properties||{};
        const tProp=props["문서명"]||props["이름"]||props["제목"]||props["Name"]||{};
        const name=(tProp.title||tProp.rich_text||[]).map(t=>t.plain_text||"").join("").trim()||"(제목없음)";
        const createdTimeProp=props["생성 일시"]||{};
        const createdAt=(createdTimeProp.type==="created_time"?createdTimeProp.created_time:null)||page.created_time||"";
        const dateStr=createdAt.slice(0,10);
        if(!dateStr) return null;
        const catProp=props["분류"]||{};
        const category=catProp.select?.name||catProp.multi_select?.[0]?.name||"";
        // 게임 목록 relation IDs 수집 (resolve 후 게임명 표시)
        const gameProp=props["게임 목록"]||{};
        const gameRelIds=(gameProp.relation||[]).map(r=>r.id);
        // 산출물 (URL)
        const outProp=props["산출물"]||props["링크"]||{};
        const outputUrl=outProp.url||outProp.rich_text?.[0]?.plain_text||"";
        return{
          id:"note_"+page.id,
          pageId:page.id,
          notionPageId:page.id,
          title:name,
          date:dateStr,
          endDate:dateStr,
          category,
          gameRelIds,
          gameNames:[], // resolve 후 채워짐
          outputUrl,
          isNote:true,
          notionUrl:`https://notion.so/${page.id.replace(/-/g,"")}`
        };
      }).filter(Boolean);
      // 게임명 resolve
      const allRelIds=[...new Set(notes.flatMap(n=>n.gameRelIds))];
      if(allRelIds.length>0){
        try{
          const rr=notionTok
            ? await fetch(`${API}/api/notion-pages?ids=${allRelIds.join(",")}`,{
                headers:{"Authorization":"Bearer "+notionTok,"Notion-Version":"2022-06-28"}
              })
            : await fetch(`${API}/api/notion-public?action=pages&ids=${allRelIds.join(",")}`);
          if(rr.ok){
            const titleMap=await rr.json();
            notes.forEach(n=>{
              n.gameNames=n.gameRelIds.map(id=>titleMap[id]||"").filter(Boolean);
            });
          }
        }catch(e){console.warn("노트 게임명 resolve 실패",e);}
      }
      setNoteEvs(notes);
      showToast("노트 "+notes.length+"개 로드됨");
    }catch(e){showToast("노트 읽기 실패: "+e.message);}finally{setNoteLoading(false);}
  }

  // Notion DB 목록 조회
  async function searchNotionDbs(){
    if(!notionTok){showToast("Token을 먼저 입력해주세요.");return;}
    try{
      const r=await fetch(`${API}/api/notion?path=search`,{
        headers:{"Authorization":"Bearer "+notionTok,"Notion-Version":"2022-06-28"}
      });
      if(!r.ok){showToast("DB 조회 실패 "+r.status);return;}
      const d=await r.json();
      const dbs=(d.results||[]).map(db=>{
        const n=db.title?.[0]?.plain_text||"(제목없음)";
        return `[${db.id}] ${n}`;
      });
      setDebugLog(p=>({...p,"방송":(p["방송"]||"")+"\n=== Notion DB 목록 ===\n"+dbs.join("\n")+"\n==="}));
      showToast(dbs.length+"개 DB 발견 → 전체 로그 확인");
    }catch(e){showToast("DB 조회 실패: "+e.message);}
  }

  const active=new Set(games.filter(g=>g.on).map(g=>g.id));

  const TYPE_ORDER={"픽업":0,"업데이트":1,"특별 방송":2,"영상":3};
  const cellEvs=cell=>{
    // 게임 이벤트 (모든 소식은 게시일 기준)
    const gameRaw=events.filter(e=>{
      if(!active.has(e.gameId)||!filt(e)) return false;
      // 모든 타입: 게시일 하루만 표시
      return e.date===cell.ds;
    });
    // 업데이트 "적용일" 마커: applyDate가 이 셀과 일치하는 업데이트
    const applyMarkers=events.filter(e=>{
      if(!active.has(e.gameId)||e.type!=="업데이트"||!e.applyDate) return false;
      if(!filt(e)) return false;
      return e.applyDate===cell.ds && e.applyDate!==e.date; // 게시일과 다를 때만
    }).map(e=>({...e,_isApplyMarker:true}));
    gameRaw.push(...applyMarkers);
    // 방송 일정 (날짜 정확히 일치)
    const bcRaw=broadcastEvs.filter(e=>e.date===cell.ds);
    const raw=[...bcRaw,...gameRaw];
    // 같은 게임+타입: 첫 번째 항목 대표로, 나머지 count만 +1
    const seen=new Map();
    raw.forEach(e=>{
      const key=e.gameId+"|"+e.type;
      if(!seen.has(key)) seen.set(key,{...e,_count:1});
      else seen.get(key)._count++;
    });
    return [...seen.values()].sort((a,b)=>(TYPE_ORDER[a.type]??9)-(TYPE_ORDER[b.type]??9));
  };
  // HOYO_CFGS getter가 localStorage 저장 후 사라지므로 실시간 주입
  const HOYO_MAP_=React.useMemo(()=>Object.fromEntries(HOYO_CFGS.map(c=>[c.id,c])),[]);
  const gOf=id=>{
    const g=games.find(g=>g.id===id);
    if(!g) return null;
    if(!g.icon){const def=HOYO_MAP_[id];if(def?.icon) return {...g,icon:def.icon};}
    return g;
  };
  // 게임명 → Notion relation page ID 매핑 (broadcastEvs·noteEvs에서 수집)
  const gameIndex=React.useMemo(()=>{
    const idx=new Map();
    broadcastEvs.forEach(ev=>{
      (ev.gameRelIds||[]).forEach((rid,i)=>{if(ev.gameNames?.[i]) idx.set(ev.gameNames[i],rid);});

    noteEvs.forEach(n=>{
      (n.gameRelIds||[]).forEach((rid,i)=>{if(n.gameNames?.[i]) idx.set(n.gameNames[i],rid);});
    });
    return idx;

  const gameNames=React.useMemo(()=>[...new Set([...gameIndex.keys()])].sort(),[gameIndex]);

  const allLogsText = Object.entries(debugLog).map(([gid,log])=>{

                <button onClick={()=>setShowAllLogs(false)} style={{fontSize:11,padding:"3px 10px",borderRadius:4,border:".5px solid var(--br)",background:"var(--bi)",color:"var(--ts)",cursor:"pointer",fontFamily:"inherit"}}>닫기</button>
              </div>
            </div>
            <div style={{flex:1,overflow:"auto",padding:"12px 16px"}}>
              {games.length===0||!allLogsText
                ? <p style={{color:"var(--tm)",fontSize:12,textAlign:"center",padding:24}}>아직 수집 로그가 없습니다. 재수집 후 다시 열어주세요.</p>

                </>}

          </button>

        </div>

      <div className="content-row" style={{flex:1,display:"flex",overflow:"hidden"}}>
        {/* Sidebar */}

            {(()=>{
